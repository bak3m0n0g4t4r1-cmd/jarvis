  ждать_вывод: false
  синонимы: ["выключи вайфай", "выключи wifi", "выключи вай фай", "отключи вайфай",
             "отключи беспроводную сеть", "выключи вай-фай"]
  примеры: ["выключи вайфай", "отключи вай фай", "убери беспроводную сеть"]
  подтверждение: "Выключаю Wi-Fi, сэр."

bluetooth_on:
