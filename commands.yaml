# ═══════════════════════════════════════════════════════════════════════════════
#  УМНАЯ ЛАМПА (ТЗ-8) — это НЕ shell-команды: поле «лампа» вместо «команда».
#  core форвардит «лампа» в jarvis/lamp → исполняет и ОЗВУЧИВАЕТ сервис jarvis-lamp (паки в
#  settings.yaml → lamp). Цвета — из карты settings.yaml → lamp.colors. Идут ПОСЛЕ brightness_*,
#  чтобы голое «ярче/темнее» (точное совпадение) шло на ЭКРАН, а в ветке «лампа» — на лампу.
# ═══════════════════════════════════════════════════════════════════════════════
lamp_on:
  описание: "Включить умную лампу"
  лампа: {действие: вкл}
  синонимы: ["включи лампу", "зажги лампу", "включи свет", "зажги свет", "лампу включи", "свет включи"]
  примеры: ["включи лампу", "зажги свет"]
lamp_off:
  описание: "Выключить умную лампу"
  лампа: {действие: выкл}
  синонимы: ["выключи лампу", "погаси лампу", "выключи свет", "погаси свет", "потуши свет", "лампу выключи"]
  примеры: ["выключи лампу", "погаси свет"]
lamp_brighter:
  описание: "Лампа — ярче"
  лампа: {действие: ярче}
  синонимы: ["лампу ярче", "свет ярче", "сделай лампу ярче", "ярче лампу", "прибавь яркость лампы", "ярче", "светлее", "поярче"]
  примеры: ["сделай лампу ярче", "свет ярче"]
lamp_dimmer:
  описание: "Лампа — тусклее"
  лампа: {действие: темнее}
  синонимы: ["лампу темнее", "свет темнее", "сделай лампу тусклее", "темнее лампу", "убавь яркость лампы", "темнее", "тусклее", "потемнее"]
  примеры: ["сделай лампу темнее", "свет тусклее"]
lamp_auto:
  описание: "Вернуть авто-режим лампы (реакции на события)"
  лампа: {действие: авто}
  синонимы: ["лампу в авто", "авто режим лампы", "автоматический режим лампы", "верни авто лампе"]
  примеры: ["верни лампе авто режим"]
lamp_color_тёплый:
  описание: "Лампа — тёплый свет"
  лампа: {действие: цвет, цвет: тёплый}
  синонимы: ["лампу тёплым", "тёплый свет", "сделай лампу тёплой", "тёплым", "тёплый цвет лампы"]
  примеры: ["сделай лампу тёплой", "тёплый свет"]
lamp_color_белый:
  описание: "Лампа — белый свет"
  лампа: {действие: цвет, цвет: белый}
  синонимы: ["лампу белым", "белый свет", "сделай лампу белой", "белым"]
  примеры: ["сделай лампу белой", "белый свет"]
lamp_color_красный:
  описание: "Лампа — красный свет"
  лампа: {действие: цвет, цвет: красный}
  синонимы: ["лампу красным", "красный свет", "сделай лампу красной", "красным", "красную"]
  примеры: ["сделай лампу красной", "красный свет"]
lamp_color_зелёный:
  описание: "Лампа — зелёный свет"
  лампа: {действие: цвет, цвет: зелёный}
  синонимы: ["лампу зелёным", "зелёный свет", "сделай лампу зелёной", "зелёным", "зелёную"]
  примеры: ["сделай лампу зелёной", "зелёный свет"]
lamp_color_синий:
  описание: "Лампа — синий свет"
  лампа: {действие: цвет, цвет: синий}
  синонимы: ["лампу синим", "синий свет", "сделай лампу синей", "синим", "синюю", "синей"]
  примеры: ["сделай лампу синей", "синий свет"]
lamp_color_жёлтый:
  описание: "Лампа — жёлтый свет"
  лампа: {действие: цвет, цвет: жёлтый}
  синонимы: ["лампу жёлтым", "жёлтый свет", "сделай лампу жёлтой", "жёлтым"]
  примеры: ["сделай лампу жёлтой", "жёлтый свет"]
lamp_color_фиолетовый:
  описание: "Лампа — фиолетовый свет"
  лампа: {действие: цвет, цвет: фиолетовый}
  синонимы: ["лампу фиолетовым", "фиолетовый свет", "сделай лампу фиолетовой", "фиолетовым"]
  примеры: ["сделай лампу фиолетовой", "фиолетовый свет"]
lamp_warmer:
  описание: "Лампа — белый теплее"
  лампа: {действие: тепло}
  синонимы: ["теплее белый", "лампу теплее", "теплее свет", "сделай белый теплее", "теплее"]
  примеры: ["сделай свет теплее", "белый теплее"]
lamp_cooler:
  описание: "Лампа — белый холоднее"
  лампа: {действие: холод}
  синонимы: ["холоднее белый", "лампу холоднее", "холоднее свет", "сделай белый холоднее", "холоднее"]
  примеры: ["сделай свет холоднее", "белый холоднее"]


# ═══════════════════════════════════════════════════════════════════════════════
#  ТЕЛЕФОН (ТЗ-9) — команда телефону: НЕ shell, поле «телефон» вместо «команда».
#  core форвардит «телефон» в jarvis/phone/command → принимает Android-приложение «Спутник».
# ═══════════════════════════════════════════════════════════════════════════════
find_phone:
  описание: "Заставить телефон зазвонить (найти телефон)"
  телефон: {command: find_phone}
  синонимы: ["найди телефон", "найди мой телефон", "где телефон", "где мой телефон", "потерял телефон", "телефон найди", "позвони на телефон"]
  примеры: ["найди телефон", "где мой телефон"]
  подтверждение:
    - "Ищу телефон, сэр — он сейчас отзовётся."
    - "Телефон зазвонит, сэр."
    - "Сейчас найдём, сэр."


# ═══════════════════════════════════════════════════════════════════════════════
#  ВЕТКИ ПРОДОЛЖЕНИЙ (ТЗ-5) — служебная карта, НЕ команды.
#  После выполнения команды активируется её ВЕТКА: пока она активна, фразы-продолжения
#  (синонимы перечисленных команд) принимаются БЕЗ обращения «Джарвис». Новая полная команда
#  (с «Джарвис»/PTT) переключает активную ветку. Списки могут пересекаться (напр. громкость —
#  и в «звук», и в «музыка»); «домашняя» ветка тега — ПЕРВАЯ, где он встретился.
#  Продолжения = СУЩЕСТВУЮЩИЕ команды (со своими паками «подтверждение»). Редактируй смело.
# ═══════════════════════════════════════════════════════════════════════════════
ветки:
  звук: [volume_up, volume_down, volume_mute, volume_unmute, volume_max, volume_half, volume_low]
  музыка: [media_playpause, media_next, media_prev, volume_up, volume_down, music_yandex, music_my_wave]
  яркость: [brightness_up, brightness_down, brightness_max, brightness_half, brightness_low]
  браузер: [browser, tab_new, tab_close, tab_restore, tab_next, tab_prev]
  сеть: [wifi_on, wifi_off, bluetooth_on, bluetooth_off]
  ночной: [night_toggle, brightness_up, brightness_down]
  лампа: [lamp_on, lamp_off, lamp_brighter, lamp_dimmer, lamp_warmer, lamp_cooler, lamp_color_тёплый, lamp_color_белый, lamp_color_красный, lamp_color_зелёный, lamp_color_синий, lamp_color_жёлтый, lamp_color_фиолетовый]

# ═══════════════════════════════════════════════════════════════════════════════
#  ОБРАТИМОСТЬ (ТЗ-5) — для команды «отмени»: тег → обратный тег. Команды без записи здесь
#  считаются НЕОБРАТИМЫМИ (Джарвис скажет, что отменить нельзя). Только безопасные пары.
# ═══════════════════════════════════════════════════════════════════════════════
обратимость:
  volume_up: volume_down
  volume_down: volume_up
  volume_mute: volume_unmute
  volume_unmute: volume_mute
  brightness_up: brightness_down
  brightness_down: brightness_up
  wifi_on: wifi_off
  wifi_off: wifi_on
  bluetooth_on: bluetooth_off
  bluetooth_off: bluetooth_on
  night_toggle: night_toggle
  lamp_on: lamp_off
  lamp_off: lamp_on
