# --- Диагностика (вывод пишется в лог, озвучивается факт выполнения) ---
network_scan:
  описание: "Быстрое сканирование портов шлюза"
  команда: ["nmap", "-F", "192.168.1.1"]
  ждать_вывод: true
  синонимы: ["просканируй сеть", "сканируй сеть", "сканирование сети", "скан сети",
             "сканируй порты", "просканируй порты", "проверь порты шлюза"]
  примеры: ["просканируй сеть", "сделай скан портов шлюза", "проверь открытые порты"]
  подтверждение: "Запускаю сканирование сети, сэр."
