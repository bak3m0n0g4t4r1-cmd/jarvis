  команда: ["loginctl", "lock-session"]
  ждать_вывод: false
  синонимы: ["заблокируй экран", "заблокируй компьютер", "блокировка экрана",
             "запри экран", "залочь экран", "заблокируй"]
  примеры: ["заблокируй экран", "запри компьютер", "поставь блокировку экрана"]
  подтверждение: "Блокирую экран, сэр."

screenshot:
  описание: "Снимок всего экрана (KDE Spectacle, в фоне)"
  команда: ["spectacle", "-b", "-f", "-n"]
  ждать_вывод: false
  синонимы: ["сделай скриншот", "скриншот", "снимок экрана", "сними экран",
             "сфоткай экран", "заскринь", "сделай снимок экрана"]
  примеры: ["сделай скриншот", "сними экран", "сфотографируй экран"]
  подтверждение: "Делаю снимок экрана, сэр."

