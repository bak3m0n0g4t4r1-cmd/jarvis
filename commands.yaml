# Карта команд OS-агента «Джарвиса» — и источник истины для распознавания.
#
# Чтобы ДОБАВИТЬ команду — скопируй блок ниже и заполни. Менять Python-код при
# этом НЕ нужно: и OS-агент (исполнение), и матчер (распознавание) читают этот файл.
#
#   <тег>:
#     описание: "что делает команда"                 # человеку и как доп. фраза для эмбеддингов
#     команда: ["программа", "аргумент1", ...]        # СПИСОК аргументов (shell=False)
#     ждать_вывод: false                              # true — дождаться завершения и озвучить статус
#     синонимы: ["громче", "сделай громче", ...]      # СЛОЙ ПРАВИЛ: ключевые слова/формы (по-русски, широко)
#     примеры: ["сделай погромче", ...]               # СЛОЙ ЭМБЕДДИНГОВ: живые формулировки для семантики
#     подтверждение: "Прибавляю звук, сэр."           # реплика в характере: СТРОКА или СПИСОК
#                                                     # (пак вариаций — выбор без повторов; нет поля → общий пул)
#
# КАК РАСПОЗНАЁТСЯ (см. jarvis/matcher.py):
#   1) ПРАВИЛА (мгновенно, без моделей): фраза нормализуется и сверяется с «синонимы»
#      — точное совпадение, вхождение фразы, все слова синонима во фразе, нечёткое сравнение.
#   2) ЭМБЕДДИНГИ (если правила промахнулись): rubert-tiny2 (ONNX) ищет ближайшую
#      «примеры»-фразу по смыслу. ВАЖНО: эмбеддинги НЕ различают антонимы (вкл/выкл,
#      громче/тише) — направление ОБЯЗАНЫ задавать «синонимы» с конкретным глаголом.
#
# Безопасность: команда запускается через subprocess (shell=False) строго списком
# аргументов. Пользовательский текст сюда НЕ подставляется — матчер присылает только ТЕГ.
#
# Набор рассчитан на KDE Plasma 6 (Wayland) + PipeWire на TUXEDO OS (Ubuntu-база).
# Только безопасные, обратимые действия. ВНИМАНИЕ: точные бинарии/флаги сверь на целевой
# машине — `jarvis doctor` подсветит теги, чьего бинаря нет в $PATH.

# --- Звук (PipeWire: wpctl из wireplumber) ---
volume_up:
  описание: "Сделать громче на 5%"
  команда: ["wpctl", "set-volume", "@DEFAULT_AUDIO_SINK@", "5%+"]
  ждать_вывод: false
  синонимы: ["сделай громче", "погромче", "прибавь звук", "прибавь громкость",
             "добавь звук", "добавь громкость", "увеличь громкость", "увеличь звук",
             "подними громкость", "сделай погромче", "громче"]
  примеры: ["сделай погромче", "прибавь немного звука", "увеличь громкость",
            "ничего не слышно, добавь звук", "сделай звук громче"]
  подтверждение:
    - "Прибавляю звук, сэр."
    - "Делаю погромче, сэр."
    - "Поднимаю громкость, сэр."

volume_down:
  описание: "Сделать тише на 5%"
  команда: ["wpctl", "set-volume", "@DEFAULT_AUDIO_SINK@", "5%-"]
  ждать_вывод: false
  синонимы: ["сделай тише", "потише", "убавь звук", "убавь громкость",
             "уменьши громкость", "уменьши звук", "понизь громкость",
             "сделай потише", "приглуши звук", "тише"]
  примеры: ["сделай потише", "убавь немного звук", "слишком громко, уменьши громкость",
            "сделай звук тише", "приглуши немного"]
  подтверждение:
    - "Убавляю звук, сэр."
    - "Делаю потише, сэр."
    - "Снижаю громкость, сэр."

volume_mute:
  описание: "Выключить звук (mute)"
  команда: ["wpctl", "set-mute", "@DEFAULT_AUDIO_SINK@", "1"]
  ждать_вывод: false
  синонимы: ["выключи звук", "отключи звук", "убери звук", "выруби звук",
             "заглуши звук"]
  примеры: ["выключи звук совсем", "убери звук", "приглуши динамики"]
  подтверждение:
    - "Выключаю звук, сэр."
    - "Приглушаю всё, сэр."
    - "Звук выключен, сэр."

volume_unmute:
  описание: "Включить звук (unmute)"
  команда: ["wpctl", "set-mute", "@DEFAULT_AUDIO_SINK@", "0"]
  ждать_вывод: false
  синонимы: ["верни звук", "восстанови звук", "вруби звук", "верни громкость"]
  примеры: ["верни звук", "восстанови звук", "снова со звуком"]
  подтверждение:
    - "Включаю звук, сэр."
    - "Возвращаю звук, сэр."
    - "Звук снова с вами, сэр."

