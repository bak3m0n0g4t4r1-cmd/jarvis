# ═══════════════════════════════════════════════════════════════════════════════
#  РАСПИСАНИЕ «ДЖАРВИСА» — будильники (в будущем сюда же лягут таймеры/напоминания)
# ═══════════════════════════════════════════════════════════════════════════════
#  Правится и голосом, и вручную. Поля каждого будильника:
#    тип:    утренний | обычный
#    время:  "ЧЧ:ММ" (24-часовой формат, напр. "07:00", "19:30")
#    метка:  текст или пусто (чтобы различать обычные будильники)
#    повтор: ежедневный | разовый
#    активен: true | false
#    id:     служебный идентификатор — НЕ меняйте
#
#  ⚠ При изменении будильников ГОЛОСОМ файл перезаписывается — ручные комментарии
#    внутри не сохранятся (значения — сохранятся). Структура — задел под будущее.
#
#  Пример заполнения вручную (или просто скажите «Джарвис, поставь будильник…»):
#    будильники:
#      - тип: утренний
#        время: "07:00"
#        метка: null
#        повтор: ежедневный
#        активен: true
#        id: morning
#      - тип: обычный
#        время: "19:30"
#        метка: ужин
#        повтор: разовый
#        активен: true
#        id: "reg:ужин"
# ═══════════════════════════════════════════════════════════════════════════════

будильники: []
