# ═══════════════════════════════════════════════════════════════════════════════
#  РАСПИСАНИЕ «ДЖАРВИСА» — будильники, таймеры, секундомеры (в будущем — напоминания)
# ═══════════════════════════════════════════════════════════════════════════════
#  Правится и голосом, и вручную. Поля:
#   будильники:  тип(утренний|обычный), время("ЧЧ:ММ"), метка, повтор(ежедневный|разовый),
#                активен, id
#   таймеры:     длительность_сек, окончание(ISO-время), метка, активен, сработал, id
#   секундомеры: старт(ISO-время), стоп(ISO|пусто=идёт), метка, активен, id
#   (id — служебный идентификатор, НЕ меняйте; ISO-время — местное)
#
#  ⚠ При изменении ГОЛОСОМ файл перезаписывается — ручные комментарии внутри не
#    сохранятся (значения — сохранятся). Структура — задел под будущее.
#
#  Примеры (или просто скажите «Джарвис, поставь таймер на 5 минут»):
#    будильники:
#      - {тип: утренний, время: "07:00", метка: null, повтор: ежедневный, активен: true, id: morning}
#    таймеры:
#      - {длительность_сек: 300, окончание: "2026-06-09T19:05:00", метка: чай, активен: true, сработал: false, id: "timer:чай"}
#    секундомеры:
#      - {старт: "2026-06-09T18:00:00", стоп: null, метка: работа, активен: true, id: "sw:работа"}
# ═══════════════════════════════════════════════════════════════════════════════

