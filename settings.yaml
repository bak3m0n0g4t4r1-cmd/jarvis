# ─── НАПОМИНАНИЯ И ЗАДАЧИ ────────────────────────────────────────────────────────
# Напоминание «дёргает» в момент; задача — пункт списка дел (опц. с дедлайном).
# Команды: «напомни про стирку сегодня в 12», «напомни сегодня прогуляться» (→ через 1.5–3ч),
# «напомни» (→ диалог дозапроса), «напомни 20 июля…», «перенеси/удали напоминание …»,
# «удали все напоминания», «что у меня на сегодня», «какие напоминания»; «добавь задачу …»,
# «какие задачи», «задача выполнена …», «удали задачу …», «удали все задачи».
# Хранятся в schedule.yaml. Плейсхолдеры: {текст} {когда} {дата} {список} {метка}.
reminders:
  # Напоминание на СЕГОДНЯ без точного времени → через случайные N минут (1.5–3 часа).
  random_min_minutes: 90
  random_max_minutes: 180
  # Будущая дата без времени → случайное время в дневном окне [start; end] (часы), не ночью.
  day_window_start_hour: 10
  day_window_end_hour: 18
  # Громкость срабатывания напоминания (0..1) — заметная (обходит «тихо→тихо»).
  reminder_volume: 0.9
  # Чайм перед напоминанием (как у таймера). false — только голос.
  reminder_chime: true
  # Таймаут диалога дозапроса (с): сколько core молчит, ожидая ответ на «о чём / когда».
  dialog_timeout_seconds: 45

  # --- Паки фраз напоминаний ---
  set:
    - "Напомню {текст} {когда}, сэр."
    - "Хорошо, сэр, напомню {текст} {когда}."
    - "Принято, сэр: {текст} — {когда}."
  set_random:
    - "Напомню {текст} в ближайшие пару часов, сэр."
    - "Хорошо, сэр, скоро напомню: {текст}."
    - "Принято, сэр. Напомню {текст} в течение пары часов."
  fire:
    - "Сэр, напоминаю: {текст}."
    - "Напоминание, сэр: {текст}."
    - "Сэр, пора — {текст}."
  fire_random:
    - "Сэр, вы просили напомнить — {текст}."
