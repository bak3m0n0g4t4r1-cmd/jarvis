# ═══════════════════════════════════════════════════════════════════════════════
#  НАСТРОЙКИ «ДЖАРВИСА» — единый файл всех параметров
# ═══════════════════════════════════════════════════════════════════════════════
#
#  Меняй ЛЮБОЙ параметр прямо здесь — применится после перезапуска: `jarvis start`.
#  Каждый параметр снабжён комментарием: что значит, единицы, разумный диапазон.
#
#  • Если параметр убрать/закомментировать — возьмётся разумный ДЕФОЛТ (не сломается).
#  • Если файла нет вовсе — Джарвис работает на дефолтах.
#  • Переменная окружения JARVIS_* (если задана) перебивает значение отсюда (для systemd/отладки).
#  • ⚠ — критичные параметры, настроенные опытным путём: меняй осторожно.
#
#  Источник истины для команд — отдельный файл commands.yaml (теги, синонимы, примеры).
# ═══════════════════════════════════════════════════════════════════════════════


# ─── ГОЛОС (TTS): синтез Piper + громкость ───────────────────────────────────────
voice:
  # Базовая громкость голоса (0.0–1.0) — ОТПРАВНАЯ ТОЧКА. Поверх неё работает адаптация
  # (тише в тишине под шёпот, громче в шуме, ducking музыки). Поднята для чёткой слышимости.
  base_volume: 0.85
  # Минимальная громкость (шёпот в полной тишине, когда пользователь говорит совсем тихо).
  volume_min: 0.35
  # Максимальная громкость потока (выше неё включается программное усиление gain).
  volume_max: 1.0
  # Предел программного усиления при СИЛЬНОМ шуме (1.5 = до 150%; на пиках возможен лёгкий хрип).
  gain_max: 1.5
  # Греть голос Piper при старте: true — первая фраза звучит сразу (ценой ~106 МБ RAM),
  # false — лениво (экономия памяти, но первая реплика после запуска ждёт ~3 с загрузки).
  preload: true
  # Задержка аудиоузла pw-cat (мс): меньше — быстрее старт звука. 30 мс комфортно на N100.
  latency_ms: 30
  # Конкретный sink PipeWire для вывода. Пусто — системный вывод по умолчанию.
  tts_sink: ""


# ─── АДАПТИВНАЯ ГРОМКОСТЬ: по реальному уровню сигнала (RMS) ─────────────────────
# Меряем ФАКТИЧЕСКИЙ уровень звука (амплитуду), а не положение регулятора громкости.
adaptive_audio:
  # Включить адаптацию громкости. false — голос всегда на base_volume (фиксированно).
  enabled: true
  # Порог реального уровня музыки/звука ноута (RMS 0..1): выше — приглушаем (ducking). 0.02 ≈ тихо.
  duck_threshold: 0.02
  # До какой доли приглушать музыку при разговоре (0.35 = 35%; НЕ в ноль — остаётся слышна фоном).
  duck_level: 0.35
  # Порог «тихо вокруг» (RMS внешнего шума): ниже — громкость идёт за речью пользователя
  # (вплоть до шёпота), выше — за уровнем шума (разборчивость важнее тихости пользователя).
  quiet_threshold: 0.015
  # Коэффициент «колонки→микрофон»: внешний_шум = микрофон − k·воспроизведение. Подстрой, если
  # свой звук просачивается в замер шума (больше k — сильнее вычитание). Защита от самоусиления.
  noise_subtract_k: 0.7
  # Насколько громкость следует за внешним шумом (больше — резче растёт в шуме).
  noise_to_volume: 3.0
  # Насколько громкость следует за громкостью речи пользователя в тишине (больше — чувствительнее).
  user_to_volume: 4.0
  # Скорость плавных переходов громкости/ducking (0..1; доля приближения к цели за шаг). Меньше — плавнее.
  volume_ramp: 0.25
  # Окно/период замера RMS фоновыми замерщиками (с). Короткое — отзывчивее, чуть больше CPU.
  noise_window: 0.1


# ─── СЛУХ (STT): захват, wake-word, VAD, анти-эхо ───────────────────────────────
hearing:
  # Частота захвата микрофона (Гц). 16000 — под модели STT, не менять без необходимости.
  sample_rate: 16000
  # Слова-обращения (распознаются как «Джарвис»). zipformer искажает — добавляй встреченные формы.
  wake_words: ["джарвис", "джарвиз", "жарвис", "жарвиз", "сервис", "джарвес"]
  # Порог нечёткого совпадения wake-word (difflib 0..1): ниже — больше ложных срабатываний.
  wake_word_fuzzy_threshold: 0.7

  # ⚠ VAD-ПОРОГИ — НАСТРОЕНЫ ОПЫТНЫМ ПУТЁМ. Менять ОСТОРОЖНО: напрямую влияет на распознавание речи.
  vad_threshold: 0.3          # ⚠ чувствительность детектора голоса (0..1)
  vad_min_silence: 0.8        # ⚠ пауза (с), после которой фраза считается законченной
  vad_min_speech: 0.25        # минимальная длительность речи (с), чтобы считать сегментом
  # Размер кольцевого буфера VAD (с). Команды короткие — 10 с с запасом; больше = больше RAM.
  vad_buffer_seconds: 10
  # Потоки sherpa-onnx (VAD + распознаватель). 1 — экономнее на N100 при постоянном прослушивании.
  stt_num_threads: 1
  # Мин. длина аудиосегмента (семплы) для распознавателя: короче → ошибка модели. 8000 = 0.5с@16кГц.
  min_segment_samples: 8000

  # ⚠ АНТИ-ЭХО (чтобы Джарвис не распознавал собственный голос из колонок) — менять осторожно.
  speaking_tail: 1.0          # ⚠ пауза слушания (с) после конца речи Джарвиса
  echo_content_window: 2.0    # окно (с) сверки распознанного с фразой Джарвиса (отсев эха)
  echo_similarity_threshold: 0.6  # порог похожести (0..1): выше — считаем эхом и отбрасываем

  # Источник захвата: пусто — системный микрофон по умолчанию. Имя echo-cancel source (PipeWire)
  # → шумоподавление перед STT (создаётся отдельно; см. CLAUDE.md). Системный default не меняется.
  stt_source: ""


# ─── РАСПОЗНАВАНИЕ КОМАНД: матчер (правила + эмбеддинги) ─────────────────────────
recognition:
  # Порог слоя ПРАВИЛ (difflib 0..1): ниже — фраза не считается совпавшей с синонимом.
  fuzzy_threshold: 0.7
  # Порог слоя ЭМБЕДДИНГОВ (косинус 0..1): ниже — семантический поиск не уверен → переспрос.
  emb_threshold: 0.6
  # Мин. отрыв лучшего кандидата от второго (косинус): меньше — кандидаты почти равны → переспрос
  # (защита от путаницы антонимов вкл/выкл при семантическом поиске).
  emb_margin: 0.04


# ─── СИСТЕМА: MQTT-шина, логи, heartbeat ────────────────────────────────────────
system:
  # Брокер MQTT (локальная шина между сервисами).
  mqtt_host: "localhost"
  mqtt_port: 1883
  mqtt_keepalive: 60          # keepalive MQTT (с)
  mqtt_reconnect_min: 1.0     # мин. пауза переподключения (с)
  mqtt_reconnect_max: 15.0    # макс. пауза переподключения (с) — мал, чтобы быстро ожить после suspend
  # Уровень логов: INFO (человеческие строки) или DEBUG (плюс трассы ожидаемых сбоёв).
  log_level: "INFO"
  log_max_bytes: 2097152      # размер лог-файла до ротации (байты, 2 МБ)
  log_backup_count: 3         # сколько старых лог-файлов хранить
  # Раз в столько секунд сервис пишет в лог «жив» (видно, что не висит). 0 — выключить.
  heartbeat_interval: 300.0


# ─── ПУТИ И МОДЕЛИ ──────────────────────────────────────────────────────────────
models:
  # Каталоги ресурсов. ОТНОСИТЕЛЬНЫЙ путь разрешается от КОРНЯ проекта (значения ниже —
  # относительные, так и задумано). АБСОЛЮТНЫЙ путь («/…») — если модели/логи лежат ВНЕ
  # проекта. Под systemd сервисы стартуют из $HOME, но config.py приводит пути к абсолютным
  # (резолв от корня) — поэтому относительные значения здесь безопасны.
  models_dir: "models"
  logs_dir: "logs"
  commands_file: "commands.yaml"
  # Пути конкретных моделей выводятся из models_dir автоматически — обычно НЕ трогают.
  # Раскомментируй и укажи абсолютный путь, только если модель лежит вне models_dir:
  # vad_model: "/путь/silero_vad.onnx"
  # zipformer_encoder: "/путь/encoder.int8.onnx"
  # piper_model: "/путь/ru_RU-dmitri-medium.onnx"
  # embedder_model: "/путь/rubert-tiny2-onnx/model_optimized.onnx"
