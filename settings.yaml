# Команды голосом: «поставь таймер на 5 минут», «таймер на 10 минут с пометкой чай»,
# «измени таймер чай на 15 минут», «удали таймер чай», «сколько осталось на таймере чай»,
# «удали все таймеры»; «засеки время», «засеки время с пометкой работа», «сколько прошло»,
# «сколько на секундомере работа», «останови секундомер», «сбрось секундомер», «удали все секундомеры».
# Хранятся в schedule.yaml. Плейсхолдеры: {длительность} {остаток} {прошло} {метка}.
timers:
  # Громкость срабатывания таймера (0..1) — заметная (обходит адаптив «тихо→тихо»).
  timer_volume: 0.9
  # Чайм (короткий сигнал) перед фразой срабатывания. false — только голос.
  timer_chime: true

  # --- Таймер ---
  timer_set:
    - "Т+аймер на {длительность} заведён, сэр."
    - "Засёк {длительность}, сэр — извещ+у по истеч+ении."
    - "Изв+ольте, сэр. Отсч+итываю {длительность}."
  timer_set_label:
    - "Т+аймер «{метка}» на {длительность} заведён, сэр."
    - "Засёк {длительность} на «{метка}», сэр."
    - "Изв+ольте, сэр. «{метка}» — {длительность}, отсчёт пошёл."
  timer_move:
    - "Перезавёл т+аймер на {длительность}, сэр."
    - "Т+аймер теп+ерь на {длительность}, сэр."
    - "Изв+ольте, сэр. Н+овая дл+ительность — {длительность}."
  timer_move_label:
    - "Т+аймер «{метка}» теп+ерь на {длительность}, сэр."
    - "Перест+авил «{метка}» на {длительность}, сэр."
    - "Изв+ольте, сэр. «{метка}» — теп+ерь {длительность}."
  timer_cancel:
    - "Т+аймер снят, сэр."
    - "Отсчёт пр+ерван, сэр."
    - "Изв+ольте, сэр. Т+аймера б+ольше нет."
  timer_cancel_label:
    - "Т+аймер «{метка}» снят, сэр."
    - "Прерв+ал «{метка}», сэр."
    - "Изв+ольте, сэр. «{метка}» б+олее не сраб+отает."
  timer_delete_all:
    - "Все т+аймеры снят+ы, сэр."
    - "Оч+истил все т+аймеры, сэр."
    - "Изв+ольте, сэр. Ни одног+о т+аймера не ост+алось."
  timer_remaining:
    - "На т+аймере ост+алось {остаток}, сэр."
    - "Ещё {остаток}, сэр — терп+ение."
    - "До сигн+ала {остаток}, сэр."
  timer_remaining_label:
    - "На т+аймере «{метка}» ост+алось {остаток}, сэр."
    - "До «{метка}» ещё {остаток}, сэр."
    - "«{метка}»: оста+ётся {остаток}, сэр."
  timer_none_found:
    - "Так+ого т+аймера я не нашёл, сэр."
    - "Т+аймера с так+ой пом+еткой нет, сэр."
    - "Бо+юсь, подход+ящего т+аймера у вас нет, сэр."
  timer_fire:
    - "Сэр, вр+емя в+ышло."
    - "Т+аймер истёк, сэр."
    - "Сэр, отсчёт завершён — как и б+ыло усл+овлено."
  timer_fire_label:
    - "Сэр, «{метка}» — вр+емя в+ышло."
    - "Т+аймер «{метка}» истёк, сэр."
    - "Сэр, напомин+аю: «{метка}» подошл+о к ср+оку."
  timer_suggest_label:
    - "Т+аймеров у вас уж+е н+есколько, сэр. Д+айте им пом+етки — ин+аче я начн+у п+утаться, а +это не в мо+их пр+авилах."
    - "Т+аймер заведён, сэр. Рекоменд+ую пом+етку — ск+ажем, «с пом+еткой чай»."
    - "Изв+ольте, сэр. Чт+обы мен+ять н+ужный, сто+ит дать т+аймерам пом+етки."
  timer_need_duration:
    - "На как+ую дл+ительность завест+и т+аймер, сэр?"
    - "Уточн+ите, сэр, на ск+олько — я не разобр+ал."
    - "Бо+юсь, не рассл+ышал дл+ительность, сэр. Повтор+ите?"

  # --- Секундомер ---
  stopwatch_start:
    - "Засек+аю, сэр."
    - "Секундом+ер пошёл, сэр."
    - "Отсчёт н+ачат, сэр — счит+аю."
  stopwatch_start_label:
    - "Засёк «{метка}», сэр."
    - "Секундом+ер «{метка}» пошёл, сэр."
    - "Изв+ольте, сэр. «{метка}» — отсчёт нач+ат."
  stopwatch_elapsed:
    - "Прошл+о {прошло}, сэр."
    - "С м+омента ст+арта — {прошло}, сэр."
    - "На счет+у уж+е {прошло}, сэр."
  stopwatch_elapsed_label:
    - "На «{метка}» прошл+о {прошло}, сэр."
    - "«{метка}»: уж+е {прошло}, сэр."
    - "С м+омента «{метка}» — {прошло}, сэр."
  stopwatch_stop:
    - "Останов+ил, сэр. Ит+ог — {прошло}."
    - "Секундом+ер з+амер на {прошло}, сэр."
    - "Изв+ольте, сэр. Зафикс+ировано {прошло}."
  stopwatch_stop_label:
    - "«{метка}» остановл+ен, сэр. Ит+ог — {прошло}."
    - "Секундом+ер «{метка}» з+амер на {прошло}, сэр."
    - "Изв+ольте, сэр. «{метка}» — {прошло}."
  stopwatch_reset:
    - "Секундом+ер обнулён, сэр."
    - "Сбр+осил на ноль, сэр."
    - "Изв+ольте, сэр. Ч+истый лист."
  stopwatch_reset_label:
    - "«{метка}» обнул+ён, сэр."
    - "Сбр+осил «{метка}» на ноль, сэр."
    - "Изв+ольте, сэр. «{метка}» — с ч+истого лист+а."
  stopwatch_delete_all:
    - "Все секундом+еры обнулен+ы, сэр."
    - "Оч+истил все секундом+еры, сэр."
    - "Изв+ольте, сэр. Ни одног+о секундом+ера не ост+алось."
  stopwatch_none_found:
    - "Так+ого секунд+омера я не нашёл, сэр."
    - "Секундом+ера с так+ой пом+еткой нет, сэр."
    - "Бо+юсь, сейч+ас ни од+ин секундом+ер не зап+ущен, сэр."
  stopwatch_suggest_label:
    - "Секундом+еров уже н+есколько, сэр. Д+айте им пом+етки — так я их различ+у."
    - "Засёк, сэр. Рекоменд+ую пом+етку — ск+ажем, «с пом+еткой раб+ота»."
    - "Изв+ольте, сэр. Чт+обы спр+ашивать н+ужный, д+айте секундом+ерам пом+етки."


# ─── МИРОВОЕ ВРЕМЯ: «сколько времени в <город>» ─────────────────────────────────
# Время в любом городе + разница с РЕГИОНОМ (секция «местоположение»). Летнее время — авто (zoneinfo).
# Плейсхолдеры: {город} {время} {разница} (разница — готовая фраза «Это на … больше/меньше…»).
worldtime:
  answer:
    - "Сэр, в г+ороде {город} сейч+ас {время}. {разница}"
    - "В г+ороде {город} вр+емя {время}, сэр. {разница}"
    - "{город}: сейч+ас {время}, сэр. {разница}"
  not_found:
    - "Сэр, не нашёл г+ород {город}."
    - "Затрудн+яюсь определ+ить, где +это, сэр."
    - "Не удал+ось распозн+ать г+ород, сэр."


# ─── ПОГОДА ПО ЗАПРОСУ: «какая погода» (+ дата и город) ─────────────────────────
# «Джарвис, какая погода» → погода СЕЙЧАС по региону (секция «местоположение»). С указанием дня —
# дневной прогноз: «погода сегодня | завтра | на субботу | 13 числа | через 3 дня». Прошлое:
# «погода вчера | 5 июня» (Джарвис отвечает в прошедшем времени). Другой город: «погода в Париже».
# Источник — Open-Meteo (как утренний будильник, без ключа). Прогноз — до 16 дней вперёд; недавнее
# прошлое — до 92 дней; глубже — архив с 1940. Дальше/нет данных/нет сети → элегантный отказ.
# Плейсхолдеры: {температура} {ощущается} {характер} {темп_макс} {темп_мин} {осадки} {дата} {город}.
weather:
  # Горизонт прогноза вперёд (дней). Дальше — Джарвис честно скажет, что это уже гадание.
  forecast_max_days: 16

  # Погода СЕЙЧАС (без указания дня):
  now:
    - "Сэр, сейч+ас {город} {характер}, {температура}. Ощущ+ается как {ощущается}."
    - "За окн+ом {характер}, {температура}, сэр. По ощущ+ениям — {ощущается}."
    - "Сейч+ас {характер}, {температура}, сэр. Ощущ+ается как {ощущается} — одев+айтесь сообр+азно."
  # Прогноз на СЕГОДНЯ (день указан явно):
  day_today:
    - "Сег+одня {город} ожид+ается {характер}, от {темп_мин} до {темп_макс}, сэр. {осадки}"
    - "На сег+одня, сэр: {характер}, днём до {темп_макс}, н+очью +около {темп_мин}. {осадки}"
    - "Сег+одня {характер}, сэр — от {темп_мин} до {темп_макс}. {осадки}"
  # Прогноз на БУДУЩИЙ день ({дата} — «завтра», «в субботу», «пятнадцатого июня»):
  day_future:
    - "{дата} {город} ожид+ается {характер}, от {темп_мин} до {темп_макс}, сэр. {осадки}"
    - "По прогн+озу на {дата}, сэр: {характер}, от {темп_мин} до {темп_макс}. {осадки}"
    - "{дата} обещ+ают {характер}, сэр — днём до {темп_макс}, н+очью +около {темп_мин}. {осадки}"
  # Погода в ПРОШЛОМ ({дата} — «вчера», «позавчера», «пятнадцатого июня»):
  day_past:
    - "{дата} {город} б+ыло {характер}, от {темп_мин} до {темп_макс}, сэр."
    - "+Если п+амять мне не измен+яет, сэр, {дата} сто+яло {характер}, от {темп_мин} до {темп_макс}."
    - "{дата}, сэр, б+ыло {характер} — от {темп_мин} до {темп_макс}."
  # Слишком далеко вперёд (за горизонтом прогноза):
  too_far_future:
    - "Так далек+о вперёд, сэр, прогн+оз уж+е из +области гад+ания — д+альше двух нед+ель я не заглян+у."
    - "Бо+юсь, сэр, наст+олько далёкий прогн+оз ненадёжен. Спрос+ите бл+иже к д+елу."
  # Слишком глубоко в прошлое (нет данных в архиве):
  too_far_past:
    - "За +эту д+ату, сэр, д+анных у мен+я нет — арх+ив так глубок+о не достаёт."
    - "Бо+юсь, сэр, до +этого дня пог+одные летоп+иси не дотяг+иваются."
  # Нет сети / сбой запроса:
  no_network:
    - "Сэр, до метеосв+одки сейч+ас не дотян+уться — пох+оже, сеть недост+упна."
    - "Не удаётся получ+ить пог+оду, сэр. Подозрев+аю, д+ело в соедин+ении."
    - "Прогн+оз сейч+ас вне досяг+аемости, сэр — пров+ерьте сеть."
  # Город из запроса не распознан:
  not_found_city:
    - "Сэр, так+ого г+орода я не нашёл — уточн+ите назв+ание?"
    - "Затрудн+яюсь определ+ить, где +это, сэр. Повтор+ите г+ород?"


# ─── МОНЕТКА: «подкинь монетку» / «орёл или решка» ──────────────────────────────
coin:
