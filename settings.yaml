# ═══════════════════════════════════════════════════════════════════════════════
#  НАСТРОЙКИ «ДЖАРВИСА» — единый файл всех параметров
# ═══════════════════════════════════════════════════════════════════════════════
#
#  Меняй ЛЮБОЙ параметр прямо здесь — применится после перезапуска: `jarvis start`.
#  Каждый параметр снабжён комментарием: что значит, единицы, разумный диапазон.
#
#  • Если параметр убрать/закомментировать — возьмётся разумный ДЕФОЛТ (не сломается).
#  • Если файла нет вовсе — Джарвис работает на дефолтах.
#  • Переменная окружения JARVIS_* (если задана) перебивает значение отсюда (для systemd/отладки).
#  • ⚠ — критичные параметры, настроенные опытным путём: меняй осторожно.
#
#  Источник истины для команд — отдельный файл commands.yaml (теги, синонимы, примеры).
# ═══════════════════════════════════════════════════════════════════════════════


# ─── ГОЛОС (TTS): синтез Piper + громкость ───────────────────────────────────────
voice:
  # Скорость речи (length_scale Piper): 1.0 — норма, БОЛЬШЕ — медленнее, меньше — быстрее.
  # 1.12 ≈ чуть медленнее и разборчивее (дефолтный голос «тараторит»). Разумно: 0.8–1.4.
  length_scale: 1.12
  # Высота тона: 1.0 — норма голоса, МЕНЬШЕ — ниже, больше — выше. Реализовано подменой
  # частоты воспроизведения с компенсацией темпа → параметр НЕЗАВИСИМ от length_scale.
  # ⚠ Не формант-сохраняющий: держи 0.88–1.0 (лёгкое понижение тона); сильный сдвиг «поплывёт».
  pitch: 0.96
  # Базовая громкость голоса (0.0–1.0) — ОТПРАВНАЯ ТОЧКА. Поверх неё работает адаптация
  # (тише в тишине под шёпот, громче в шуме, ducking музыки). Поднята для чёткой слышимости.
  base_volume: 0.90
  # Минимальная громкость (шёпот в полной тишине, когда пользователь говорит совсем тихо).
  volume_min: 0.35
  # Максимальная громкость потока (выше неё включается программное усиление gain).
  volume_max: 1.0
  # Предел программного усиления при СИЛЬНОМ шуме (1.5 = до 150%; на пиках возможен лёгкий хрип).
  gain_max: 1.5
  # Греть голос Piper при старте: true — первая фраза звучит сразу (ценой ~106 МБ RAM),
  # false — лениво (экономия памяти, но первая реплика после запуска ждёт ~3 с загрузки).
  preload: true
  # Число потоков синтеза Piper (Этап 25). 0 — не трогать (онрантайм сам, обычно по числу ядер).
  # Рычаг задержки ПЕРВОГО ЗВУКА на N100: подберите замером (лог «PERF tts: первый звук …» при
  # system.perf_debug=true) вместе с performance-governor. Разумно пробовать 0, 2, 4.
  synth_threads: 0
  # Задержка аудиоузла pw-cat (мс): меньше — быстрее старт звука. 30 мс комфортно на N100.
  latency_ms: 30
  # Конкретный sink PipeWire для вывода. Пусто — системный вывод по умолчанию.
  tts_sink: ""

  # ── Движок синтеза ──────────────────────────────────────────────────────────
  # silero — голос eugene (специализирован под русский, понимает `+`-ударения); все фразы
  # заранее рендерятся в WAV-кэш (`jarvis tts build`), в рантайме играется готовый WAV без
  # задержки и без torch. piper — старый онлайн-движок (фоллбэк). Меняешь — пересобери кэш.
  engine: "silero"
  # Спикер Silero: aidar | baya | kseniya | xenia | eugene. eugene — мужской, под Джарвиса.
  silero_speaker: "eugene"
  # Частота синтеза Silero: 8000 | 24000 | 48000. 24000 — баланс качество/CPU/размер кэша.
  silero_sample_rate: 24000
  # Секунд простоя до выгрузки torch из памяти (свободный текст редок; вернуть RAM, swap=0). 0 — не выгружать.
  silero_unload_after: 120
  # Размер чанка стриминга готового WAV в pw-cat (мс): мельче — плавнее пульсация ламп.
  play_chunk_ms: 60

  # ── JARVIS-DSP: офлайн-обработка голоса под «дворецкого» (применяется при рендере) ──
  # Подбирается ползунками в `python tools/voice_studio.py` (мгновенное прослушивание + A/B).
  # Любой ключ можно убрать — возьмётся дефолт из tts_dsp.DEFAULT_PARAMS. После правки —
  # пересобрать кэш: `jarvis tts build --force` (или сменится сигнатура — старый кэш осиротеет).
  dsp:
    pitch_cents: -120        # тон ниже на ~1.2 полутона (0 — без сдвига)
    tempo: 1.0               # доп. темп речи (1.0 — без изменения; <1 — степеннее)
    bass_gain: 3.0           # тёплый низ, дБ
    bass_freq: 110           # частота полки низа, Гц
    presence_gain: 2.0       # присутствие/чёткость речи, дБ
    presence_freq: 2800      # центр presence, Гц
    treble_gain: -2.0        # мягче шипящие, дБ
    treble_freq: 9000        # частота полки верха, Гц
    comp_ratio: 2.2          # компрессия (ровный спокойный уровень); ≤1 — выкл
    comp_threshold: -18      # порог компрессора, дБ
    comp_makeup: 2.0         # компенсация громкости, дБ
    reverb: true             # лёгкий «эфир» (не эхо)
    reverb_in: 0.85
    reverb_out: 0.9
    reverb_delays: "40|55"   # мс
    reverb_decays: "0.22|0.18"
    limit: 0.97              # финальный лимитер против клиппинга (0..1)
    trim_silence: true       # срезать хвостовую тишину (иначе лампы «висят» в конце)

  # ── Ручные ударения {слово: слово_с_+} ──────────────────────────────────────
  # Silero УЧИТЫВАЕТ `+` перед ударной гласной (в отличие от Piper). Здесь — омографы и
  # редкие слова, где авто-ударение ошибается. Пример: за+мок (строение) vs зам+ок (на двери).
  stress: {}
  # Авто-ударения для свободного текста (silero-stress), лениво. false — Silero ставит сам.
  auto_stress: false


# ─── АДАПТИВНАЯ ГРОМКОСТЬ: по реальному уровню сигнала (RMS) ─────────────────────
# Меряем ФАКТИЧЕСКИЙ уровень звука (амплитуду), а не положение регулятора громкости.
adaptive_audio:
  # Включить адаптацию громкости. false — голос всегда на base_volume (фиксированно).
  enabled: true
  # Порог реального уровня музыки/звука ноута (RMS 0..1): выше — приглушаем (ducking). 0.02 ≈ тихо.
  duck_threshold: 0.02
  # До какой доли приглушать музыку при разговоре (0.35 = 35%; НЕ в ноль — остаётся слышна фоном).
  duck_level: 0.35
  # Порог «тихо вокруг» (RMS внешнего шума): ниже — громкость идёт за речью пользователя
  # (вплоть до шёпота), выше — за уровнем шума (разборчивость важнее тихости пользователя).
  quiet_threshold: 0.015
  # Коэффициент «колонки→микрофон»: внешний_шум = микрофон − k·воспроизведение. Подстрой, если
  # свой звук просачивается в замер шума (больше k — сильнее вычитание). Защита от самоусиления.
  noise_subtract_k: 0.7
  # Насколько громкость следует за внешним шумом (больше — резче растёт в шуме).
  noise_to_volume: 3.0
  # Насколько громкость следует за громкостью речи пользователя в тишине (больше — чувствительнее).
  user_to_volume: 4.0
  # Скорость плавных переходов громкости/ducking (0..1; доля приближения к цели за шаг). Меньше — плавнее.
  volume_ramp: 0.25
  # Окно/период замера RMS фоновыми замерщиками (с). Короткое — отзывчивее, чуть больше CPU.
  noise_window: 0.1
  # ⚠ Шум меряется как ПОЛ (асимметрично): быстро ВНИЗ (за тишиной), медленно ВВЕРХ — всплеск голоса
  # пользователя НЕ задирает фон (фикс «первая фраза орёт, дальше шёпот»). Не трогать без нужды.
  noise_floor_down: 0.25     # доля приближения вниз за замер
  noise_floor_up: 0.02       # доля приближения вверх за замер (мала → всплески игнорируются)
  # Сглаживание ИТОГОВОЙ громкости голоса между фразами (0..1). Меньше — плавнее; 1.0 — без сглаживания.
  volume_smoothing: 0.5


# ─── ГРОМКОСТЬ ГОЛОСА (голосовая установка: проценты/доли) ──────────────────────
# «громкость 30», «половина громкости», «три четверти» → БАЗОВАЯ громкость. Адаптив (выше) — поверх.
voice_volume:
  ack:
    - "Гр+омкость {процент} проц+ентов, сэр."
    - "Ст+авлю {процент} проц+ентов, сэр."
    - "Изв+ольте, сэр — {процент} проц+ентов."


# ─── ПРОИЗНОШЕНИЕ (словарь правок ПЕРЕД синтезом Piper) ─────────────────────────
# «слово: замена» — применяется целым словом, регистронезависимо, до синтеза. Латиницу заменяйте
# кириллицей (Piper-ru читает латиницу криво). ⚠ СВЕРЕНО: этот голос НЕ учитывает акут ́ — ударение
# правится только ФОНЕТИЧЕСКИМ РЕСПЕЛЛИНГОМ (переписать слово как надо читать). Дополняйте своими.
# ЧЕСТНО: идеальное ударение во всех словах у Piper недостижимо.
pronunciation:
  "Wi-Fi": "вай-фай"
  "WiFi": "вай-фай"
  "wifi": "вай-фай"
  "Bluetooth": "блютус"
  "Gemini": "джемини"
  "GitHub": "гитхаб"
  "Gmail": "джимейл"
  "Thorium": "ториум"
  "Telegram": "телеграм"
  "Yandex": "яндекс"
  "speedtest": "спидтест"
  "MQTT": "эм-ку-ти-ти"
  "USB": "ю-эс-би"
  "URL": "ю-эр-эль"
  "VPN": "вэ-пэ-эн"


# ─── СЛУХ (STT): захват, wake-word, VAD, анти-эхо ───────────────────────────────
hearing:
  # Частота захвата микрофона (Гц). 16000 — под модели STT, не менять без необходимости.
  sample_rate: 16000
  # Слова-обращения (распознаются как «Джарвис»). zipformer искажает — добавляй встреченные формы.
  wake_words: ["джарвис", "джарвиз", "жарвис", "жарвиз", "сервис", "джарвес", "чарвис", "чарвиз", "джарви", "джарвас"]
  # Порог нечёткого совпадения wake-word (difflib 0..1): ниже — больше ложных срабатываний.
  wake_word_fuzzy_threshold: 0.7

  # ⚠ VAD-ПОРОГИ — НАСТРОЕНЫ ОПЫТНЫМ ПУТЁМ. Менять ОСТОРОЖНО: напрямую влияет на распознавание речи.
  vad_threshold: 0.3          # ⚠ чувствительность детектора голоса (0..1) — НЕ трогать
  # Пауза тишины (с), после которой фраза считается законченной. ПРЯМОЙ вклад в задержку отклика:
  # Джарвис ждёт столько ПОСЛЕ ваших слов, прежде чем начать отвечать. 0.5 — быстрый отклик (Этап 25,
  # снижено с 0.8 по запросу). Слишком низкое рвёт медленную речь с паузами; push-to-talk обходит совсем.
  vad_min_silence: 0.5        # ⚙ рычаг задержки: ниже — быстрее реакция, выше — терпимее к паузам в речи
  vad_min_speech: 0.25        # минимальная длительность речи (с), чтобы считать сегментом
  # Размер кольцевого буфера VAD (с). Команды короткие — 10 с с запасом; больше = больше RAM.
  vad_buffer_seconds: 10
  # Потоки sherpa-onnx (VAD + распознаватель). 1 — экономнее на N100 при постоянном прослушивании.
  stt_num_threads: 1
  # Мин. длина аудиосегмента (семплы) для распознавателя: короче → ошибка модели. 8000 = 0.5с@16кГц.
  min_segment_samples: 8000

  # Адаптивный порог VAD: в ТИШИНЕ чуть снижаем порог (негромкая команда ловится с первого раза),
  # при росте шума — возврат к закреплённой базе vad_threshold (базовое поведение НЕ меняется).
  # Шумовой пол меряется по собственному потоку захвата STT (без второго аудиострима).
  vad_adaptive: true
  vad_quiet_offset: 0.08      # на сколько опустить порог в тишине (0.3 − 0.08 = 0.22)
  vad_quiet_floor: 0.20       # нижняя граница порога в тишине (ниже не опускаем — страховка)

  # ⚠ АНТИ-ЭХО (чтобы Джарвис не распознавал собственный голос из колонок) — менять осторожно.
  speaking_tail: 1.0          # ⚠ пауза слушания (с) после конца речи Джарвиса
  echo_content_window: 2.0    # окно (с) сверки распознанного с фразой Джарвиса (отсев эха)
  echo_similarity_threshold: 0.6  # порог похожести (0..1): выше — считаем эхом и отбрасываем

  # Источник захвата: пусто — системный микрофон по умолчанию. Имя echo-cancel source (PipeWire)
  # → шумоподавление перед STT (создаётся отдельно; см. CLAUDE.md). Системный default не меняется.
  # ВНИМАНИЕ: на этой машине PortAudio видит только «default» — denoised-источник напрямую не задать
  # (нужна ручная настройка ALSA, см. CLAUDE.md). По умолчанию шум давят ducking+адаптивный порог+PTT.
  stt_source: ""

  # ── PUSH-TO-TALK: зажми клавишу → Джарвис слушает команду БЕЗ обращения «Джарвис», пока держишь;
  #    отпустил → распознаёт. Надёжный путь в шуме/музыке. Работает ПАРАЛЛЕЛЬНО с wake-word.
  #    ⚠ Нужна группа input: `sudo usermod -aG input $USER` + ПЕРЕЛОГИН (та же, что для ydotool).
  push_to_talk_enabled: true
  # Клавиша: «правый ctrl» (по умолч.), «левый ctrl», «правый shift», «правый alt», «пробел»… или код evdev.
  push_to_talk_key: "правый ctrl"
  # Приглушать музыку с ноута на время прослушивания по кнопке (ducking из адаптивной громкости).
  duck_while_listening: true


# ─── ПЕРЕБИВАНИЕ РЕЧИ (barge-in): оборвать озвучку, когда вы заговорили ───────────
# Пока Джарвис говорит, его можно перебить: он МГНОВЕННО замолкает и слушает новый ввод.
#  • Кнопкой (push-to-talk, правый Ctrl) — самый надёжный путь, без ложных (физический сигнал).
#  • Голосом — по ТОЧНОМУ обращению «Джарвис…» поверх речи. Консервативно: на этой машине нет
#    аппаратного эхоподавления, микрофон слышит сам голос Джарвиса, поэтому требуем точный wake
#    + порог по громкости (вы должны говорить ГРОМЧЕ эха). Честно: 100% без AEC не гарантируется.
barge_in:
  enabled: true            # мастер-выключатель (в т.ч. PTT-обрыв). false — Джарвиса не перебить.
  voice_enabled: true      # перебивать голосом по точному «Джарвис…». false — только кнопкой.
  min_rms: 0.03            # энерго-гейт голосового barge (RMS 0..1): тише — это эхо/фон, не прерываем.


# ─── РАСПОЗНАВАНИЕ КОМАНД: матчер (правила + эмбеддинги) ─────────────────────────
recognition:
  # Порог слоя ПРАВИЛ (difflib 0..1): ниже — фраза не считается совпавшей с синонимом.
  fuzzy_threshold: 0.7

  # ── Слой 2 «семантика»: ML-классификатор (LogReg) поверх ONNX-эмбеддингов ──
  # Обучается на синонимах+примерах из commands.yaml, веса кешируются (matcher_clf.npz).
  # ВАЖНО: антонимы (вкл/выкл, громче/тише) различает СЛОЙ ПРАВИЛ, а не классификатор —
  # rubert-tiny2 не кодирует полярность. Классификатор лишь калибрует уверенность и
  # разводит «семейства» команд, когда правила промахнулись.
  clf_enabled: true       # false → старый косинус-kNN (тоже рабочий fallback)
  clf_c: 10.0            # сила L2-регуляризации (больше — слабее): C=10 подобран бенчем
  clf_threshold: 0.30     # порог predict_proba 0..1: ниже — Слой 2 не уверен → переспрос
  # (низкий, т.к. softmax по 92 классам; принимает ~94% верных in-sample, OOS ≤0.25 отсекаются)
  clf_margin: 0.10        # мин. отрыв вероятности лучшего от второго → иначе переспрос (антонимы)

  # ── Косинус-fallback (когда классификатор недоступен/выключен) ──
  # Порог слоя ЭМБЕДДИНГОВ (косинус 0..1): ниже — семантический поиск не уверен → переспрос.
  emb_threshold: 0.6
  # Мин. отрыв лучшего кандидата от второго (косинус): меньше — кандидаты почти равны → переспрос
  # (защита от путаницы антонимов вкл/выкл при семантическом поиске).
  emb_margin: 0.04

  # INT8-эмбеддер: предпочитать квантованную модель model_int8.onnx, если она есть (×4 меньше RAM).
  # Сгенерировать: jarvis models --quantize. false → всегда fp32 (model_optimized.onnx).
  prefer_int8: true

  # Отклик на ГОЛОЕ «Джарвис» (позвали и замолчали): раньше такая фраза терялась молча.
  listening_phrases:
    - "Сл+ушаю, сэр."
    - "Да, сэр?"
    - "Весь вним+ание, сэр."


# ─── СТАРТОВОЕ ОБЪЯВЛЕНИЕ: фирменная фраза при запуске (jarvis start) ──────────────
# При `jarvis start` Джарвис озвучивает ОДНУ фразу из пака — по реальному статусу запуска:
# все сервисы поднялись (active/running) → пак успеха; что-то не поднялось/перезапускается →
# пак проблемы. Фразы выбираются БЕЗ ПОВТОРОВ (общий механизм jarvis.phrases). Редактируй смело.
startup:
  # Объявлять старт голосом. false — сервисы поднимаются молча (как было раньше).
  announce: true

  # Успешный запуск (все сервисы active/running).
  success_phrases:
    - "Сист+емы в н+орме, сэр. Рад сн+ова быть в в+ашем распоряж+ении."
    - "Зап+уск завершён усп+ешно, сэр. Гот+ов к раб+оте."
    - "Д+оброго дня, сэр. Все сист+емы акт+ивны, жду в+аших ком+анд."
    - "Я в сет+и, сэр. Всё раб+отает как час+ы."
    - "Зап+уск прошёл гл+адко, сэр. К в+ашим услуг+ам."

  # Запуск с проблемами (часть сервисов не поднялась/перезапускается) — честно, но в характере.
  problem_phrases:
    - "Сэр, я запуст+ился, но не всё гл+адко — часть сист+ем тр+ебует вним+ания."
    - "Я в сет+и, сэр, однак+о замеч+у: нек+оторые компон+енты раб+отают не в п+олную с+илу."
    - "Зап+уск завершён с огов+орками, сэр. Рекоменд+ую загл+януть в сост+ояние сист+ем."


# ─── СИСТЕМА: MQTT-шина, логи, heartbeat ────────────────────────────────────────
system:
  # Брокер MQTT (локальная шина между сервисами).
  mqtt_host: "localhost"
  mqtt_port: 1883
  mqtt_keepalive: 60          # keepalive MQTT (с)
  mqtt_reconnect_min: 1.0     # мин. пауза переподключения (с)
  mqtt_reconnect_max: 15.0    # макс. пауза переподключения (с) — мал, чтобы быстро ожить после suspend
  # Уровень логов: INFO (человеческие строки) или DEBUG (плюс трассы ожидаемых сбоёв).
  log_level: "INFO"
  log_max_bytes: 2097152      # размер лог-файла до ротации (байты, 2 МБ)
  log_backup_count: 3         # сколько старых лог-файлов хранить
  # Раз в столько секунд сервис пишет в лог «жив» (видно, что не висит). 0 — выключить.
  heartbeat_interval: 300.0
  # Замеры задержки по звеньям (строки «PERF …» в логах STT/core/TTS) — для диагностики отклика.
  perf_debug: false
  # События об ошибках: ERROR/CRITICAL в логе ЛЮБОГО сервиса → событие на шину (jarvis/event),
  # лампы мягко подсвечивают неполадку оранжевым. false — выключить канал целиком.
  error_events: true
  # Не чаще раза в N секунд на сервис (циклический сбой не превращает лампы в стробоскоп).
  error_event_throttle_seconds: 30


# ─── ПУТИ И МОДЕЛИ ──────────────────────────────────────────────────────────────
models:
  # Каталоги ресурсов. ОТНОСИТЕЛЬНЫЙ путь разрешается от КОРНЯ проекта (значения ниже —
  # относительные, так и задумано). АБСОЛЮТНЫЙ путь («/…») — если модели/логи лежат ВНЕ
  # проекта. Под systemd сервисы стартуют из $HOME, но config.py приводит пути к абсолютным
  # (резолв от корня) — поэтому относительные значения здесь безопасны.
  models_dir: "models"
  logs_dir: "logs"
  commands_file: "commands.yaml"
  # Пресет ASR (модель распознавания речи). Откат = вернуть строку и перезапустить stt.
  #   zipformer-small-ru     — лёгкая боевая (по умолчанию, ~390 МБ RSS прогретая)
  #   zipformer-ru           — полноразмерный zipformer (точнее, тяжелее)
  #   giga-am-v2-ctc         — GigaAM-v2 CTC (топ-точность по-русски, декод тяжелее)
  #   giga-am-v2-transducer  — GigaAM-v2 transducer
  # Кандидаты сперва скачать: jarvis models --download <имя из models.yaml>;
  # честное сравнение на этой машине: python tools/bench_asr.py (точность/задержка/RAM).
  asr_preset: "zipformer-small-ru"
  # Пути конкретных моделей выводятся из models_dir автоматически — обычно НЕ трогают.
  # Раскомментируй и укажи абсолютный путь, только если модель лежит вне models_dir:
  # vad_model: "/путь/silero_vad.onnx"
  # zipformer_encoder: "/путь/encoder.int8.onnx"
  # piper_model: "/путь/ru_RU-dmitri-medium.onnx"
  # embedder_model: "/путь/rubert-tiny2-onnx/model_optimized.onnx"


# ─── НАПОМИНАНИЯ О ПЕРЕРЫВЕ: детектор активности ────────────────────────────────
# Джарвис следит, что вы активно работаете (мышь/клавиатура), и по истечении цикла
# вежливо предлагает перерыв; при игноре мягко затемняет экран; за перерыв — хвалит.
# Активность = ФИЗИЧЕСКОЕ взаимодействие с ПК. Фильм/музыка/чтение без касания —
# это НЕ активность (простой растёт), перерыв не навязывается.
# ⚠ ТРЕБУЕТ прав на чтение /dev/input: `sudo usermod -aG input $USER` + ПЕРЕЛОГИН
#   (та же группа нужна ydotool). Без них сервис молчит, а `jarvis doctor` подскажет.
break_reminders:
  # Включить фичу. false — сервис запущен, но ничего не делает и молчит.
  enabled: true
  # Период тика логики (с). Реже — легче по CPU, грубее реакция. 5 — баланс.
  tick_seconds: 5.0

  # Длительность цикла активности (МИНУТЫ) — СЛУЧАЙНОЕ целое число минут в диапазоне (секунды
  # всегда 00). По её истечении (накоплено столько активной работы) Джарвис предлагает перерыв.
  cycle_min_minutes: 23
  cycle_max_minutes: 27
  # Микропауза (с): простой КОРОЧЕ — активность продолжает копиться (задумался, потянулся).
  micro_pause_seconds: 80
  # Смена деятельности (с): простой ≥ этого → цикл ПОЛНОСТЬЮ сбрасывается (отошёл, рисует
  # на листочке). Этот порог перекрывает микропаузу как условие сброса.
  reset_idle_seconds: 180
  # Длительность полноценного перерыва (МИНУТЫ) — случайное целое. Её Джарвис называет в
  # предложении и ею же засчитывает реальный простой → похвала + цикл заново.
  break_min_minutes: 4
  break_max_minutes: 6
  # Задержка повторного напоминания, если предложение проигнорировано и вы продолжаете
  # активно работать (МИНУТЫ) — случайное целое. Считается по АКТИВНОМУ времени после предложения.
  remind_after_min_minutes: 5
  remind_after_max_minutes: 6

  # Затемнение экрана при ре-напоминании: на сколько % приглушить (40–50 по ТЗ).
  dim_percent: 45
  # Нижний предел яркости при затемнении (% от максимума) — экран никогда не в ноль.
  dim_floor_percent: 10
  # Плавность затемнения: число шагов рампы и её длительность (с). Больше шагов — плавнее.
  dim_ramp_steps: 8
  dim_ramp_seconds: 2.0

  # Период переэнумерации устройств ввода /dev/input (с) — чтобы подхватывать подключённые
  # позже мышь/клавиатуру (hotplug).
  device_rescan_seconds: 60
  # Порог распознавания стоп-фразы (difflib 0..1, ПОЛНОЕ совпадение). Высокий — чтобы
  # стоп-фразы не проглатывали похожие обычные команды.
  stop_phrase_threshold: 0.85
  # Минимум отработанного активного времени (мин) для похвалы: Джарвис хвалит за перерыв,
  # ТОЛЬКО если перед ним была заметная работа ИЛИ перерыв был предложен. Иначе «перерыв» во
  # время фильма со случайным касанием мыши хвалился бы невпопад. 0 — хвалить за любой перерыв.
  praise_min_work_minutes: 10

  # ── ПАКИ ФРАЗ (выбор без повторов). Плейсхолдер {минуты} = длительность перерыва словами
  #    («пять минут») — подставляется автоматически. Стиль: лаконично, заботливо, без нотаций.
  # Предложение перерыва (Джарвис произносит одну случайно, называя минуты паузы):
  offer_phrases:
    - "Сэр, вы за раб+отой без перед+ышки уже изр+ядно. {минуты} п+аузы — и д+альше пойдёт л+егче."
    - "Позв+олю себ+е напомнить, сэр: {минуты} +отдыха сейч+ас сберег+ут вам час к в+ечеру."
    - "Сэр, с+амое вр+емя на {минуты}. Дел+а подожд+ут, а голов+а п+осле п+аузы ясн+ее."
    - "Не сочт+ите за наз+ойливость, сэр: {минуты} в сторон+е от экр+ана — и вы свеж+ее. Вы с+ами так распоряд+ились."
    - "Сэр, рекоменд+ую {минуты} п+аузы. Кор+откий +отдых — л+учшее влож+ение в сл+едующий час."
    - "Вр+емя перевест+и дух, сэр — букв+ально {минуты}. Я пригляж+у за всем."

  # Повтор-напоминание (предложение проигнорировано, экран затемнён) — чуть настойчивее, но мягко:
  remind_phrases:
    - "Сэр, я всё же наст+аиваю — м+ягко. {минуты}, и вернётесь бодр+ее."
    - "Экр+ан я пригас+ил не в ук+ор, сэр. {минуты} п+аузы — и продолж+им."
    - "Вы с+ами прос+или напомин+ать, сэр. {минуты} — и я умолк+аю."
    - "Сэр, ещё раз: {минуты} +отдыха. Это раз+умнее, чем к+ажется в мом+енте."
    - "Не упр+ямьтесь, сэр, прош+у. {минуты} — и сн+ова за д+ело, со св+ежими с+илами."

  # Похвалы (когда перерыв сделан — одна случайно).
  praise_phrases:
    - "С возвращ+ением, сэр. Вот теп+ерь — со св+ежими с+илами."
    - "Раз+умно, сэр. П+ара мин+ут в сторон+е ещё ником+у не вред+ила."
    - "Рад, что присл+ушались, сэр. Д+альше пойдёт бодр+ее."
    - "Отдохн+ули — и пр+авильно, сэр. Я цен+ю благораз+умие."
    - "С возвращ+ением, сэр. Голов+а ясн+ее, не так ли?"
    - "Превосх+одно, сэр. Вы позаб+отились о себ+е — это всегд+а в+ерный ход."

  # Ответы на стоп-фразу (Джарвис отвечает одной случайно, цикл сбрасывается, яркость возвращается).
  stop_replies:
    - "Как ск+ажете, сэр. Умолк+аю — но отм+етку сд+елаю."
    - "В+оля в+аша, сэр. Отсчёт обнул+ю."
    - "П+онял, сэр. Не наст+аиваю."
    - "Хорош+о, сэр. Но за в+ами всё равн+о пригляж+у."

  # Стоп-фразы: скажите Джарвису одну из них (после обращения «Джарвис, …»), чтобы снять
  # предложение перерыва. Держите их специфичными, чтобы не путались с командами.
  stop_phrases:
    - "не сейчас"
    - "не время"
    - "позже"
    - "потом"
    - "я работаю"
    - "не мешай"
    - "продолжаю работать"
    - "отложим перерыв"
    - "перерыв не нужен"


# ─── МЕСТОПОЛОЖЕНИЕ: регион для погоды (и в будущем — мирового времени) ──────────
местоположение:
  # Город кириллицей (можно «Город, Страна»). Из него берутся координаты для погоды
  # утреннего будильника (геокодинг Open-Meteo, координаты кэшируются). Меняйте свободно.
  регион: "Москва, Россия"


# ─── БУДИЛЬНИКИ: утренний (один) + обычные (сколько угодно) ──────────────────────
# Команды голосом: «Джарвис, поставь утренний будильник на 7 утра», «перенеси утренний на 6»,
# «поставь будильник на 7 вечера с пометкой ужин», «измени время будильника ужин на 8»,
# «удали будильник ужин», «убери все будильники» (только обычные), «отмени утренний будильник».
# Сами будильники хранятся в schedule.yaml (правится и голосом, и вручную).
alarms:
  # Включить будильники. false — сервис планировщика запущен, но ничего не делает.
  enabled: true
  # Период тика планировщика (с). 15с — минутной точности достаточно, между тиками почти 0% CPU.
  tick_seconds: 15.0
  # Окно «опоздавшего» срабатывания (мин): если время пропущено (ноутбук спал) не дольше —
  # сработать с опозданием; дольше — пропустить до следующего раза (не будить среди дня за вчера).
  grace_minutes: 10
  # Утренний по умолчанию ежедневный (true) — звонит каждый день, пока не отмените. false — разовый.
  morning_daily: true

  # Громкость пробуждения (0..1): будильник звучит НЕ тише этого — обходит адаптив «тихо→тихо».
  wake_volume: 0.95
  # Нарастающая громкость утра: короткие реплики тихо→громко перед богатой фразой (мягкое пробуждение).
  wake_rising: true
  wake_rising_start: 0.4      # стартовая громкость нарастания (0..1)
  wake_rising_steps: 3        # число ступеней от старта до wake_volume

  # Погода в утренней фразе (Open-Meteo по региону). false — фраза без погоды. Нет сети — без погоды.
  weather_enabled: true
  weather_timeout: 5.0        # таймаут сетевых запросов (с) — без сети/при сбое не виснем

  # ── ПАКИ ФРАЗ (выбор без повторов). Плейсхолдеры: {время} {темп_макс} {темп_мин} {погода} {метка} ──
  # Богатое утреннее срабатывание С погодой:
  morning_fire_weather:
    - "Д+оброе +утро, сэр. Сейч+ас {время}. За окн+ом {погода}, днём до {темп_макс}, н+очью +около {темп_мин}. Прекр+асное нач+ало дня."
    - "С д+обрым +утром, сэр. Вр+емя — {время}. Пог+ода сег+одня: {погода}, м+аксимум {темп_макс}, м+инимум {темп_мин}."
    - "Д+оброе +утро, сэр. {время}. По прогн+озу {погода}, от {темп_мин} до {темп_макс}. Пор+а начин+ать день."
    - "Подъём, сэр. Сейч+ас {время}. На +улице {погода}, ожид+ается до {темп_макс}. Жел+аю продукт+ивного дня."
  # Утреннее срабатывание БЕЗ погоды (нет сети / погода выключена):
  morning_fire_plain:
    - "Д+оброе +утро, сэр. Сейч+ас {время}. Пор+а просып+аться."
    - "С д+обрым +утром, сэр. Вр+емя — {время}. Н+овый день ждёт вас."
    - "Подъём, сэр. Сейч+ас {время}. Жел+аю б+одрого +утра."
  # Короткие реплики нарастающего пробуждения (произносятся тихо→громко перед богатой фразой):
  wake_prelude_phrases:
    - "Сэр."
    - "Сэр, пор+а встав+ать."
    - "Д+оброе +утро, сэр."

  # Утренний: подтверждение установки / переноса / «уже стоит» / «уже на нужном» / отмена / нет такого:
  morning_set:
    - "+Утренний буд+ильник заведён на {время}, сэр."
    - "Разбуж+у в {время}, сэр — б+удьте пок+ойны."
    - "Изв+ольте, сэр. +Утренний — на {время}."
  morning_move:
    - "Перенёс +утренний на {время}, сэр."
    - "+Утренний буд+ильник теп+ерь на {время}, сэр."
    - "Изв+ольте, сэр. +Утренний перест+авлен на {время}."
  morning_already:
    - "+Утренний уж+е заведён на {время}, сэр — оставл+яю как есть."
    - "Он и так на {время}, сэр. Ничег+о не мен+яю."
    - "Сэр, +утренний уж+е на {время}. Всё в с+иле."
  morning_already_move:
    - "+Утренний и так на {время}, сэр — перенос+ить н+екуда."
    - "Сэр, он уж+е на н+ужном вр+емени — {время}."
    - "Вр+емя и без тог+о {время}, сэр. Оставл+яю как есть."
  morning_cancel:
    - "+Утренний буд+ильник снят, сэр."
    - "Отмен+ил +утренний, сэр — высып+айтесь."
    - "Изв+ольте, сэр. +Утреннего б+ольше нет."
  morning_none:
    - "+Утренний буд+ильник не з+адан, сэр."
    - "У вас нет +утреннего буд+ильника, сэр."
    - "Отмен+ять н+ечего, сэр — +утренний не заведён."

  # Обычный: установка (без метки / с меткой), «уже стоит», перенос, «уже на нужном»:
  regular_set:
    - "Буд+ильник на {время} заведён, сэр."
    - "Разбуж+у в {время}, сэр."
    - "Изв+ольте, сэр. Буд+ильник — на {время}."
  regular_set_label:
    - "Буд+ильник «{метка}» на {время} заведён, сэр."
    - "Напомн+ю «{метка}» в {время}, сэр."
    - "Изв+ольте, сэр. «{метка}» — на {время}."
  regular_already:
    - "Так+ой буд+ильник уж+е сто+ит на {время}, сэр."
    - "Сэр, на {время} буд+ильник уж+е заведён."
    - "Он уж+е на {время}, сэр — дубль создав+ать не ст+ану."
  regular_move:
    - "Перенёс буд+ильник на {время}, сэр."
    - "Буд+ильник теп+ерь на {время}, сэр."
    - "Изв+ольте, сэр. Вр+емя — {время}."
  regular_already_move:
    - "Буд+ильник и так на {время}, сэр."
    - "Сэр, он уж+е на н+ужном вр+емени — {время}."
    - "Мен+ять н+ечего — уж+е {время}, сэр."
  # Удаление по метке / без метки / всех / нет такого:
  regular_cancel_label:
    - "Буд+ильник «{метка}» снят, сэр."
    - "Отмен+ил «{метка}», сэр."
    - "Изв+ольте, сэр. «{метка}» б+олее не сраб+отает."
  regular_cancel:
    - "Буд+ильник снят, сэр."
    - "Отмен+ил буд+ильник, сэр."
    - "Изв+ольте, сэр. Буд+ильник +убран."
  regular_delete_all:
    - "Все об+ычные буд+ильники сн+яты, сэр. +Утренний не тр+онут."
    - "Оч+истил буд+ильники, сэр. +Утренний ост+авил на м+есте."
    - "Изв+ольте, сэр. Об+ычных буд+ильников не ост+алось — +утренний цел."
  regular_none_found:
    - "Так+ого буд+ильника я не нашёл, сэр."
    - "Буд+ильника с так+ой пом+еткой нет, сэр."
    - "Бо+юсь, подход+ящего буд+ильника у вас нет, сэр."
  # Предложение поставить метку (когда стало несколько будильников без меток):
  suggest_label:
    - "Сэр, у вас теп+ерь н+есколько буд+ильников. Сов+етую дать им пом+етки — так я смог+у различ+ать их по назв+анию."
    - "Буд+ильник пост+авлен, сэр. Рекоменд+ую доб+авить пом+етку, наприм+ер «с пом+еткой +ужин» — ин+аче их легк+о перепут+ать."
    - "Гот+ово, сэр. Чт+обы пот+ом мен+ять н+ужный, д+айте будильник+ам пом+етки."
  # Срабатывание обычного (без метки / с меткой):
  regular_fire:
    - "Сэр, буд+ильник. Сейч+ас {время}."
    - "Вним+ание, сэр — сраб+отал буд+ильник. Вр+емя {время}."
    - "Сэр, напомин+аю о буд+ильнике. {время}."
  regular_fire_label:
    - "Сэр, напомин+аю — {метка}. Сейч+ас {время}."
    - "Буд+ильник «{метка}», сэр. Вр+емя {время}."
    - "Сэр, пор+а — {метка}. {время}."
  # Переспрос, если время в команде не разобрано:
  need_time:
    - "Сэр, на как+ое вр+емя пост+авить буд+ильник?"
    - "Уточн+ите вр+емя, сэр — я не разобр+ал."
    - "Прост+ите, сэр, не рассл+ышал вр+емя. Повтор+ите?"


