# ─── НАПОМИНАНИЯ И ЗАДАЧИ ────────────────────────────────────────────────────────
# Напоминание «дёргает» в момент; задача — пункт списка дел (опц. с дедлайном).
# Команды: «напомни про стирку сегодня в 12», «напомни сегодня прогуляться» (→ через 1.5–3ч),
# «напомни» (→ диалог дозапроса), «напомни 20 июля…», «перенеси/удали напоминание …»,
# «удали все напоминания», «что у меня на сегодня», «какие напоминания»; «добавь задачу …»,
# «какие задачи», «задача выполнена …», «удали задачу …», «удали все задачи».
# Хранятся в schedule.yaml. Плейсхолдеры: {текст} {когда} {дата} {список} {метка}.
reminders:
  # Напоминание на СЕГОДНЯ без точного времени → через случайные N минут (1.5–3 часа).
  random_min_minutes: 90
  random_max_minutes: 180
  # Будущая дата без времени → случайное время в дневном окне [start; end] (часы), не ночью.
  day_window_start_hour: 10
  day_window_end_hour: 18
  # Громкость срабатывания напоминания (0..1) — заметная (обходит «тихо→тихо»).
  reminder_volume: 0.9
  # Чайм перед напоминанием (как у таймера). false — только голос.
  reminder_chime: true
  # Таймаут диалога дозапроса (с): сколько core молчит, ожидая ответ на «о чём / когда».
  dialog_timeout_seconds: 45

  # --- Паки фраз напоминаний ---
  set:
    - "Напомн+ю {текст} {когда}, сэр."
    - "Хорош+о, сэр, напомн+ю {текст} {когда}."
    - "Прин+ято, сэр: {текст} — {когда}."
  set_random:
    - "Напомн+ю {текст} в ближ+айшие п+ару час+ов, сэр."
    - "Хорош+о, сэр, ск+оро напомн+ю: {текст}."
    - "Прин+ято, сэр. Напомн+ю {текст} в теч+ение п+ары час+ов."
  fire:
    - "Сэр, напомин+аю: {текст}."
    - "Напомин+ание, сэр: {текст}."
    - "Сэр, пор+а — {текст}."
  fire_random:
    - "Сэр, вы прос+или напомн+ить — {текст}."
    - "Напомин+аю, как прос+или, сэр: {текст}."
    - "Сэр, та с+амая напомин+алка — {текст}."
  dialog_what:
    - "О чём напомн+ить, сэр?"
    - "Что напомн+ить, сэр?"
    - "Хорош+о, сэр. О чём вам напомн+ить?"
  dialog_when:
    - "На когд+а пост+авить напомин+ание, сэр?"
    - "Когд+а напомн+ить, сэр?"
    - "А на как+ое вр+емя, сэр?"
  dialog_cant_when:
    - "Не разобр+ал когд+а, сэр. Скаж+ите д+ату или вр+емя — напр+имер «з+автра в д+есять»."
    - "Прост+ите, сэр, когд+а +именно? Напр+имер «сег+одня в шесть» +или «в п+ятницу»."
  dialog_cancel:
    - "Хорош+о, сэр, отмен+ил."
    - "Как ск+ажете, сэр, не б+уду."
    - "Прин+ято, сэр. Заб+ыли."
  move:
    - "Перенёс напомин+ание {текст} на {когда}, сэр."
    - "Изв+ольте, сэр: {текст} — теп+ерь {когда}."
    - "Напомин+ание {текст} перест+авлено на {когда}, сэр."
  cancel:
    - "Снял напомин+ание {текст}, сэр."
    - "Отмен+ил напомин+ание про {текст}, сэр."
    - "Изв+ольте, сэр. {текст} — б+олее не потрев+ожу."
  delete_all:
    - "Все напомин+ания снят+ы, сэр."
    - "Оч+истил напомин+ания, сэр."
    - "Изв+ольте, сэр. Ни одног+о напомин+ания не ост+алось."
  none_found:
    - "Так+ого напомин+ания я не нашёл, сэр."
    - "Напомин+ания с так+им опис+анием нет, сэр."
    - "Бо+юсь, подход+ящего напомин+ания у вас нет, сэр."
  need_text:
    - "О чём напомн+ить, сэр?"
    - "Что запис+ать в напомин+ание, сэр?"
  list:
    - "Сэр, в+аши напомин+ания: {список}."
    - "На пов+естке, сэр: {список}."
    - "Напомин+ания, сэр: {список}."
  list_empty:
    - "Акт+ивных напомин+аний нет, сэр."
    - "Сэр, напомин+аний у вас нет."
  today_list:
    - "На сег+одня, сэр: {список}."
    - "Сег+одня у вас, сэр: {список}."
  today_empty:
    - "На сег+одня ничег+о не заплан+ировано, сэр."
    - "Сэр, на сег+одня всё ч+исто."

  # --- Паки фраз задач ---
  task_add:
    - "Запис+ал в сп+исок: {текст}, сэр."
    - "Внёс, сэр: {текст}."
    - "Изв+ольте, сэр. «{текст}» — в сп+иске дел."
  task_list:
    - "В+аши зад+ачи, сэр: {список}."
    - "В сп+иске дел, сэр: {список}."
    - "На пов+естке, сэр: {список}."
  task_list_empty:
    - "Сп+исок зад+ач чист, сэр."
    - "Зад+ач нет, сэр — р+едкая р+оскошь."
  task_done:
    - "Отм+етил «{текст}» исп+олненной, сэр."
    - "Изв+ольте, сэр. «{текст}» в+ычеркнул."
    - "Превосх+одно, сэр. «{текст}» сд+елано."
  task_delete:
    - "Снял зад+ачу «{текст}», сэр."
    - "Убр+ал «{текст}» из сп+иска, сэр."
    - "Изв+ольте, сэр. «{текст}» б+олее не зн+ачится."
  task_delete_all:
    - "Сп+исок зад+ач очищ+ен, сэр."
    - "Снял все зад+ачи, сэр."
    - "Изв+ольте, сэр. Дел не ост+алось — по кр+айней м+ере, в сп+иске."
  task_none_found:
    - "Так+ой зад+ачи я не нашёл, сэр."
    - "Зад+ачи с так+им опис+анием нет, сэр."
    - "Бо+юсь, подход+ящей зад+ачи у вас нет, сэр."
  task_need_text:
    - "Как+ую зад+ачу внест+и, сэр?"
    - "Что запис+ать в сп+исок дел, сэр?"


# ─── ЦЕПОЧКИ КОМАНД: продолжения без wake-word, комбо, повтор/отмена ─────────────
# Продолжения: после команды Джарвис принимает фразы-продолжения ЕЁ ВЕТКИ без «Джарвис»
# (ветки — в commands.yaml). Комбо: «выключи блютуз и вай-фай». Повтор/отмена — по истории.
chains:
  # Принимать продолжения активной ветки без обращения «Джарвис». false — только с wake-word/PTT.
  continuations_enabled: true

  # Комбо: часть фразы не распознана.
  combo_partial:
    - "Остальн+ое, сэр, до мен+я не дошл+о — повтор+ите?"
    - "Часть пр+осьбы я не разобр+ал, сэр."
    - "Сэр, со втор+ой полов+иной не спр+авился — не рассл+ышал."
  # «Повтори последнее».
  repeat_done:
    - "Повтор+яю, сэр."
    - "Как ск+ажете — ещё раз, сэр."
    - "С удов+ольствием, сэр. Повт+орно."
  repeat_nothing:
    - "Бо+юсь, повтор+ять пок+а н+ечего, сэр."
    - "Сэр, я ещё ничег+о не д+елал — н+ечего и повтор+ять."
  # «Отмени» — обратимое выполнено.
  undo_done:
    - "Отмен+яю, сэр."
    - "Возвращ+аю как б+ыло, сэр."
    - "Б+удто и н+е было, сэр."
  # «Отмени», но нечего отменять.
  undo_nothing:
    - "Отмен+ять, сэр, пок+уда н+ечего."
    - "Сэр, в ист+ории п+усто — отк+атывать н+ечего."
  # «Отмени», но последнее действие необратимо.
  undo_irreversible:
    - "Бо+юсь, сэр, +это уж+е не отыгр+ать наз+ад."
    - "Откат+ить так+ое не в мо+их с+илах, сэр."
    - "Ув+ы, сэр, сд+еланного не вор+отишь."


# ─── УВЕДОМЛЕНИЯ (системные, через D-Bus / gdbus) ───────────────────────────────
# notify-send нет → шлём через gdbus. Кнопка «Открыть логи» открывает kitty с логом модуля.
notifications:
  enabled: true
  logs_button: "Открыть логи"           # подпись кнопки в уведомлении о сбое
  failure_title: "Джарвис — неполадка"  # заголовок уведомления о сбое
  speech_title: "Джарвис"               # заголовок уведомления-дубля речи
  audio_check_ttl: 1.5                  # кэш проверки звука перед фразой (с); освежается фоном
  # Приставка перед фразой, когда громкость вывода НА НУЛЕ (пользователь убавил — НЕ поломка).
  audio_zero:
    - "Сэр, звук на дин+амиках на нул+е — дубл+ирую в уведомл+ения."
    - "Гр+омкость на нул+е, сэр, отвеч+аю т+екстом."
    - "Дин+амики приглушен+ы до нул+я, сэр — вот т+екстом."
  # Приставка при ТЕХНИЧЕСКОМ сбое звука (устройство/PipeWire/поток) — добавится конкретная причина.
  audio_fail:
    - "Сэр, со зв+уком непол+адка — дубл+ирую в уведомл+ения."
    - "Не удаётся в+ывести г+олос, сэр — вот т+екстом."
    - "Звук сейч+ас недост+упен, сэр, дубл+ирую т+екстом."


# ─── РЕЖИМ ТИШИНЫ ────────────────────────────────────────────────────────────────
# «Без звука» → обычные фразы уходят в уведомления (без голоса); будильники/таймеры/
# напоминания ВСЕГДА звучат. «Включи звук» → голос возвращается. Состояние переживает рестарт.
silence:
  enabled: true
  # Команды тишины распознаются ТОЧНЫМ совпадением (не difflib): «включи звук» и «выключи звук»
  # отличаются на букву — difflib бы их путал. Дополняй списки реальными формулировками.
  # Команды включить тишину. ⚠ «без звука» теперь = тишина (раньше был синонимом mute).
  on_phrases: ["без звука", "режим тишины", "тихий режим", "беззвучный режим", "помолчи", "замолчи", "не говори", "молчи"]
  # Команды выключить тишину. ⚠ «включи звук» = выход из тишины (volume_unmute — «верни/вруби звук»).
  off_phrases: ["включи звук", "можешь говорить", "выйди из режима тишины", "отмени тишину", "говори", "верни голос", "громкий режим"]
  # Ответ на «без звука» (уходит в УВЕДОМЛЕНИЕ — Джарвис уже молчит).
  on_ack:
    - "Перехож+у в реж+им тишин+ы, сэр."
    - "Молч+у, сэр — отвеч+аю т+екстом."
    - "Хорош+о, сэр, д+альше без г+олоса."
  # Ответ на «включи звук» (теперь уже ГОЛОСОМ).
  off_ack:
    - "Сн+ова на связ+и, сэр."
    - "Г+олос верн+улся, сэр."
    - "Рад сн+ова говор+ить, сэр."


# ─── ПЕРЕЗАГРУЗКА (голосом, ТОЛЬКО с «Джарвис») ─────────────────────────────────
# «Джарвис, перезагрузись» → анонс + уведомление + рестарт ВСЕХ сервисов Джарвиса (НЕ ребут
# ноутбука) + статус. Фразы-триггеры рефлексивные («-сь») — не ловят «перезагрузи браузер».
restart:
  phrases: ["перезагрузись", "перезагрузи себя", "перезапустись", "перезапусти себя", "ребутнись", "рестарт", "перезагрузка джарвиса", "перезагрузись джарвис"]
  initial_delay_seconds: 2.5   # пауза перед рестартом — дать анонсу доиграть (TTS ещё жив)
  announce:
    - "Перезагруж+аюсь, сэр. Одн+у мин+уту."
    - "Перезапуск+аю себ+я, сэр."
    - "Мин+утку, сэр, перезагруж+аю сист+емы."
  success:
    - "С возвращ+ением, сэр. Все сист+емы в стро+ю."
    - "Гот+ов к раб+оте, сэр. Перезагр+узка заверш+ена."
    - "Сн+ова на связ+и, сэр. Всё в пор+ядке."
  problem:
    - "Сэр, перезагруз+ился, но часть сист+ем не поднял+ась."
    - "Гот+ов, сэр, однак+о есть непол+адки с серв+исами."
    - "Сэр, перезагр+узка прошл+а с пробл+емами — пров+ерьте л+оги."


# ─── РАБОЧИЕ СРЕДЫ (виртуальные столы KDE) ──────────────────────────────────────
# «Открой новую среду с Gemini и музыкой» → новый вирт. стол + приложения (из речи).
# Именованные среды: вызов «открой <имя> среду». apps — теги из commands.yaml.
environments:
  named:
    рабочая: {desktop: "Работа", apps: ["site_gemini", "music_yandex"]}
  triggers: ["сред", "новое пространство", "новое окружение"]
  desktop_name: "Среда"          # префикс имени создаваемого стола (из речи)
  launch_delay_seconds: 0.8      # пауза между запусками приложений (окна на новом столе)
  open:
    - "Гот+овлю раб+очее простр+анство, сэр."
    - "Обустр+аиваю н+овый стол, сэр."
    - "Изв+ольте, сэр — сред+а к в+ашим усл+угам."
  partial:
    - "Откр+ыл, что смог, сэр — часть не поддал+ась."
    - "Сред+а гот+ова, сэр, хот+я и не вполн+е."
  empty:
    - "Бо+юсь, я не разобр+ал, что откр+ыть в сред+е, сэр."
    - "Уточн+ите, сэр, чем нап+олнить сред+у."


# ─── LIVE-ПАНЕЛЬ (jarvis live) ──────────────────────────────────────────────────
live:
  refresh_seconds: 1.0       # период перерисовки панели (лёгкость на N100)
  status_ttl_seconds: 3.0    # кэш статуса сервисов (не дёргать systemctl каждый кадр)
  horizon_hours: 72          # горизонт расписания в панели (ближайшие 3 дня)


# ─── УМНЫЕ Wi-Fi ЛАМПЫ (Tuya, ЛОКАЛЬНО — без облака) ────────────────────────────
# Несколько ламп работают СИНХРОННО как группа: реакции, анимация и команды действуют на все
# сразу; к конкретной можно обратиться по имени («выключи вторую лампу»). Каждая лампа живёт
# НЕЗАВИСИМО (свой сокет/реконнект/keepalive): одна выключена из розетки → вторая работает,
# Джарвис жив. Креды — из Smart Life/Tuya IoT; IP — `python -m tinytuya scan`.
# Проверка без голоса: `jarvis lamp status|test|rtt [--lamp имя]`.
lamp:
  enabled: true

  # Список ламп: имя → креды. Имя человекочитаемое — по нему обращаемся голосом и видим
  # лампу в doctor/CLI. «вкл: false» — временно убрать лампу из группы, не удаляя запись.
  # version — протокол прошивки (частая причина «не подключается» — неверная версия).
  lamps:
    первая:
      device_id: "bfdf9694facaa742ebblpv"
      local_key: "bTuG2}b2j]bH|YJy"
      ip: "192.168.1.6"        # IP в локальной сети (пусто → автопоиск по device_id)
      version: 3.5             # СВЕРЕНО на лампе: 3.5 (не 3.3/3.4!)
      вкл: true
    вторая:
      device_id: "bff47cf23d4449f748xdsd"
      local_key: "VyF!1_s`ih#jdu*j"
      ip: "192.168.1.7"        # найдена сканом сети; версия подтверждена бродкастом
      version: 3.5
      вкл: true

  autodiscover: true         # искать лампу по device_id, если ip пуст/не отвечает
  reconnect_seconds: 30      # ПОТОЛОК паузы между попытками переподключения (старт быстрый: сразу→2→4→8→15с)
  keepalive_minutes: 0.33    # ⚠ пинг лампы раз в N минут (0.33 ≈ 20с; 0 = выключить). ЗАМЕРЕНО (Этап 21в):
                             #   лампа рвёт простаивающий TCP уже через 30–60с — пинг обязан держать паузу
                             #   трафика ≤30с, иначе сокет умирает и реакция после паузы теряется/мигает.
  socket_timeout: 4.0        # таймаут сокета (быстрый отклик/быстрый фейл)
  brightness_step: 20        # шаг «ярче/темнее» в процентах
  temp_step: 25              # шаг «теплее/холоднее» белого в процентах
  notify_unavailable: false  # слать уведомление, если лампа не в сети

  # Карта цветов: имя → RGB [0..255]. Добавляйте свои.
  colors:
    тёплый: [255, 170, 87]
    белый: [255, 255, 255]
    красный: [255, 30, 30]
    зелёный: [40, 230, 60]
    синий: [40, 90, 255]
    голубой: [60, 200, 255]
    жёлтый: [255, 210, 40]
    оранжевый: [255, 120, 20]
    фиолетовый: [170, 40, 255]
    розовый: [255, 80, 160]

  # Фоновое состояние: куда лампы возвращаются после реакций (и индикация «готов» при старте).
  # Яркость 100 — по умолчанию МАКСИМАЛЬНО ярко. Голосом: «яркость ламп пятьдесят», «лампы
  # наполовину», «лампы на максимум» — установка запоминается (переживает рестарт).
  background: {вкл: true, цвет: "тёплый", яркость: 100}

  # ── АНИМАЦИЯ В ТАКТ ГОЛОСУ ─────────────────────────────────────────────────────
  # Когда Джарвис говорит, лампы «дышат» по ОГИБАЮЩЕЙ реального звука: громкие слоги — ярче,
  # паузы — мягкий спад. Старт строго вместе со звуком (по факту первого байта аудио, не по
  # state=speaking — тот опережает звук на ~0.4–1.2с). вкл: false → прежнее ровное свечение.
  animation:
    вкл: true
    fps_max: 8               # потолок кадров/с на лампу; фактический темп задаёт ACK лампы по Wi-Fi.
                             #   ЗАМЕРЕНО на этой сети (`jarvis lamp rtt`): p50 ACK 85мс, p95 179мс
                             #   → честные ~9 кадров/с; 8 — с запасом под джиттер Wi-Fi.
    атака_мс: 60             # скорость подъёма яркости к пику (меньше — резче «удар» слога)
    спад_мс: 250             # скорость спада (больше — мягче «дыхание»)
    яркость_мин: 30          # пол яркости в паузах речи (%) — лампа не тускнеет сильно
    яркость_макс: 100        # потолок яркости на пиках (%) — на громких слогах полная яркость
    гамма: 0.6               # кривая уровень→яркость (<1 — тихие звуки заметнее)
    дрейф_оттенка: 8         # лёгкая игра тона (± градусов HSV) в такт уровню; 0 = выключить
    старт_задержка_мс: 50    # латентность вывода звука: от метки ПЕРЕД первым write в pw-cat до
                             #   слышимого звука. Задаёт ЯКОРЬ t0 (старт анимации). Подкрутка «на глаз».
    опережение_мс: 90        # на сколько лампа ОПЕРЕЖАЕТ звук, компенсируя СВОЙ конвейер (ACK Wi-Fi
                             #   ~85мс по `jarvis lamp rtt` + лаг атаки). Свет, поданный на опережение_мс
                             #   раньше, совпадёт со звуком. Больше — свет «убегает» вперёд; меньше —
                             #   отстаёт. Калибровать объективно: `jarvis lamp sync` или PERF-логи.
    макс_сек: 30             # страховка: анимация дольше N секунд принудительно гасится в фон
    окно_мс: 50              # окно огибающей в TTS (мс) — менять не нужно

  # Реакции на события. паттерн: свечение (ровно) | пульс («вдох») | мигание. длительность=0 у
  # speaking = держится, пока Джарвис говорит (фолбэк при выключенной анимации). вкл — вкл/выкл.
  # Если в момент события Джарвис ГОВОРИТ (анимация активна) — реакция не прерывает её, а
  # ПЕРЕКРАШИВАЕТ пульсацию своим цветом на свою длительность.
  reactions:
    startup:  {вкл: true,  цвет: "тёплый",     паттерн: "пульс",    яркость: 80,  длительность: 1.5, повторы: 1}
    speaking: {вкл: true,  цвет: "синий",      паттерн: "свечение", яркость: 55,  длительность: 0,   повторы: 1}
    firing:   {вкл: true,  цвет: "красный",    паттерн: "мигание",  яркость: 100, длительность: 3.0, повторы: 4}
    call:     {вкл: true,  цвет: "голубой",    паттерн: "пульс",    яркость: 100, длительность: 3.0, повторы: 4}
    # Режим тишины: мягкий фиолетовый «вдох» при входе и выходе (фон не меняется).
    silence:  {вкл: true,  цвет: "фиолетовый", паттерн: "пульс",    яркость: 40,  длительность: 1.5, повторы: 1}
    # Предложение перерыва / похвала за перерыв: спокойный зелёный пульс.
    break:    {вкл: true,  цвет: "зелёный",    паттерн: "пульс",    яркость: 60,  длительность: 2.0, повторы: 2}
    # Ошибка в Джарвисе (любая, см. system.error_events): МЯГКАЯ оранжевая пульсация — заметно,
    # но без тревоги (эталон настроя интеграции).
    error:    {вкл: true,  цвет: "оранжевый",  паттерн: "пульс",    яркость: 55,  длительность: 2.0, повторы: 2}

  # Ответы на голосовые команды лампами (паки без повторов).
  on_ack: ["Зажиг+аю, сэр.", "Да б+удет свет, сэр.", "Освещ+аю, сэр."]
  off_ack: ["Гаш+у свет, сэр.", "Погруж+аю в темнот+у, сэр.", "Л+ампы в+ыключены, сэр."]
  color_ack: ["Изв+ольте, сэр.", "Перекр+ашиваю, сэр.", "Н+овый отт+енок, сэр."]
  color_unknown: ["Бо+юсь, так+ого цв+ета в мо+ей пал+итре нет, сэр.", "Эт+ого отт+енка я не зн+аю, сэр — в+ыберите из изв+естных?"]
  bright_ack: ["Регул+ирую, сэр.", "Подстр+аиваю, сэр."]
  # Установка яркости числом/долей ({процент} — целое 5..100).
  bright_set_ack: ["+Яркость ламп {процент} проц+ентов, сэр.", "Ст+авлю {процент}, сэр.", "Изв+ольте, сэр — {процент} проц+ентов."]
  temp_ack: ["Подбир+аю отт+енок б+елого, сэр.", "Мен+яю темпер+атуру св+ета, сэр."]
  auto_ack: ["Возвращ+аю л+ампам самосто+ятельность, сэр.", "Л+ампы сн+ова реаг+ируют с+ами, сэр."]
  unavailable: ["Сэр, л+ампы не отвеч+ают — в+идимо, не в сет+и.", "Не в+ижу ламп в сет+и, сэр.", "Л+ампы сейч+ас вне досяг+аемости, сэр."]
  unavailable_one: ["Сэр, л+ампа «{имя}» не отзыв+ается.", "Л+ампа «{имя}» сейч+ас не в сет+и, сэр."]


# ─── ТЕЛЕФОН («Спутник Джарвиса», приём событий по MQTT) ────────────────────────
# Android-приложение публикует события в jarvis/phone/* (та же шина Mosquitto). Джарвис
# реагирует: звонок (озвучка+приглушение музыки+лампа), низкий заряд, уведомления/SMS,
# присутствие. Команда телефону «найди телефон» → jarvis/phone/command.
phone:
  enabled: true
  announce_calls: true          # озвучивать входящие звонки
  duck_on_call: true            # приглушать музыку на ноуте на время звонка
  call_duck_timeout_seconds: 180  # страховка: вернуть музыку через N секунд, если событие ended не пришло (0 = выкл)
  notify_notifications: true    # дублировать уведомления/SMS телефона в уведомления ноута
  battery_alerts: true          # сообщать о низком заряде телефона
  battery_repeat_minutes: 30    # не повторять про низкий заряд чаще, чем раз в N минут
  presence_greeting: true       # приветствие при возвращении домой

  # Объявление звонка. {кто} = имя (или номер, если имени нет).
  call:
    - "Сэр, вам звон+ит {кто}."
    - "Звон+ок, сэр — {кто}."
    - "Вам звон+ят, сэр: {кто}."
  # Низкий заряд телефона. {уровень} = процент.
  battery_low:
    - "Сэр, телеф+он почт+и разряж+ен — {уровень} проц+ентов."
    - "Зар+яд телеф+она н+изкий, сэр: {уровень} проц+ентов."
  # Возвращение домой (присутствие home).
  home:
    - "С возвращ+ением, сэр."
    - "Рад в+идеть вас д+ома, сэр."
    - "Д+ома, сэр."


# ─── ТЕМА KDE (голосовое переключение тёмная/светлая) ───────────────────────────
# Применяется через plasma-apply-colorscheme; toggle сам определяет текущую и ставит противоположную.
theme:
  dark_scheme: "TUXEDODark"     # схема для «тёмная тема» (см. plasma-apply-colorscheme --list-schemes)
  light_scheme: "TUXEDOLight"   # схема для «светлая тема»
  fail:                         # ответ, если схему применить не удалось
    - "Бо+юсь, смен+ить т+ему не в+ышло, сэр."
    - "Т+ема не поддал+ась, сэр — сх+ема не примен+илась."
