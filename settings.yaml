    - "Сэр, у вас нет подходящего будильника для этого."
  # Предложение поставить метку (когда стало несколько будильников без меток):
  suggest_label:
    - "Сэр, у вас теперь несколько будильников. Советую дать им пометки — так я смогу различать их по названию."
